name: Update Data

on:
  schedule:
    - cron: '0 8,20 * * *' # 8am and 8pm UTC
  workflow_dispatch: # manual trigger from Actions tab

concurrency:
  group: update-data
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch Letterboxd data
        id: letterboxd
        continue-on-error: true
        run: node scripts/process-letterboxd.js

      - name: Fetch Goodreads data
        id: goodreads
        continue-on-error: true
        run: node scripts/fetch-goodreads-rss.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/generated/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/generated/letterboxd.json data/generated/books.json
          git commit -m "chore: update letterboxd and goodreads data"
          git push
