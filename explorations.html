<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rika Portfolio — Design Explorations</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --shell-bg: #0a0a0f;
  --tab-bg: #111118;
  --tab-hover: #1a1a24;
  --tab-active-bg: #a78bfa;
  --tab-active-text: #fff;
  --tab-text: #888899;
  --tab-text-hover: #ccc;
  --border: #222233;
  --sidebar-bg: #111118;
  --sidebar-text: #c8c8d4;
  --sidebar-muted: #777788;
  --sidebar-heading: #e8e8f0;
  --accent: #a78bfa;
  --green: #4ade80;
  --amber: #fbbf24;
  --red: #f87171;
  --tab-height: 48px;
  --sidebar-width: 360px;
}

html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
  background: var(--shell-bg);
  color: var(--sidebar-text);
}

/* Tab Bar */
.tab-bar {
  display: flex;
  align-items: stretch;
  height: var(--tab-height);
  background: var(--tab-bg);
  border-bottom: 1px solid var(--border);
  padding: 0 8px;
  gap: 2px;
  user-select: none;
}

.tab {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 20px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--tab-text);
  cursor: pointer;
  border: none;
  background: none;
  transition: all 0.2s;
  position: relative;
  letter-spacing: -0.01em;
  white-space: nowrap;
}

.tab:hover {
  color: var(--tab-text-hover);
  background: var(--tab-hover);
}

.tab.active {
  color: var(--tab-active-text);
}

.tab.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 12px;
  right: 12px;
  height: 2px;
  background: var(--accent);
  border-radius: 2px 2px 0 0;
}

.tab .num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  opacity: 0.5;
}

.tab-spacer { flex: 1; }

.sidebar-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--tab-text);
  cursor: pointer;
  border: none;
  background: none;
  transition: all 0.2s;
  letter-spacing: 0.03em;
}
.sidebar-toggle:hover { color: var(--tab-text-hover); }
.sidebar-toggle.open { color: var(--accent); }
.sidebar-toggle svg { transition: transform 0.2s; }
.sidebar-toggle.open svg { transform: rotate(180deg); }

/* Main Area */
.main-area {
  display: flex;
  height: calc(100vh - var(--tab-height));
  overflow: hidden;
}

/* Iframe */
.proto-frame {
  flex: 1;
  min-width: 0;
  border: none;
  background: var(--shell-bg);
}

/* Sidebar */
.sidebar {
  width: 0;
  overflow: hidden;
  background: var(--sidebar-bg);
  border-left: 1px solid var(--border);
  transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  flex-shrink: 0;
}

.sidebar.open {
  width: var(--sidebar-width);
}

.sidebar-inner {
  width: var(--sidebar-width);
  height: 100%;
  overflow-y: auto;
  padding: 28px 24px 40px;
}

.sidebar-inner::-webkit-scrollbar { width: 4px; }
.sidebar-inner::-webkit-scrollbar-track { background: transparent; }
.sidebar-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.sb-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--sidebar-heading);
  margin-bottom: 4px;
  letter-spacing: -0.02em;
}

.sb-subtitle {
  font-size: 13px;
  color: var(--sidebar-muted);
  margin-bottom: 24px;
  line-height: 1.5;
}

.sb-section {
  margin-bottom: 24px;
}

.sb-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--accent);
  margin-bottom: 10px;
}

.sb-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.sb-list li {
  font-size: 13px;
  line-height: 1.55;
  padding-left: 14px;
  position: relative;
}

.sb-list li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 8px;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0.6;
}

.sb-list.tradeoffs li::before { background: var(--amber); }

.sb-tag {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 6px;
  background: rgba(167, 139, 250, 0.1);
  color: var(--accent);
  border: 1px solid rgba(167, 139, 250, 0.15);
}

.sb-complexity {
  font-size: 13px;
  line-height: 1.6;
}

.sb-divider {
  height: 1px;
  background: var(--border);
  margin: 20px 0;
}

/* Mobile */
@media (max-width: 768px) {
  .tab { padding: 0 10px; font-size: 11px; }
  .tab .label { display: none; }
  .tab .num { opacity: 1; font-size: 13px; }
  :root { --sidebar-width: 100vw; }
  .sidebar { position: fixed; top: var(--tab-height); right: 0; bottom: 0; z-index: 100; border-left: none; }
}
</style>
</head>
<body>

<div class="tab-bar">
  <button class="tab active" data-dir="1" onclick="switchTab(1)">
    <span class="num">01</span><span class="label">RikaOS</span>
  </button>
  <button class="tab" data-dir="1b" onclick="switchTab('1b')">
    <span class="num">01b</span><span class="label">Ghibli OS</span>
  </button>
  <button class="tab" data-dir="1c" onclick="switchTab('1c')">
    <span class="num">01c</span><span class="label">Holographic OS</span>
  </button>
  <button class="tab" data-dir="1d" onclick="switchTab('1d')">
    <span class="num">01d</span><span class="label">Terrarium OS</span>
  </button>
  <button class="tab" data-dir="3" onclick="switchTab(3)">
    <span class="num">03</span><span class="label">Petri Dish</span>
  </button>
  <button class="tab" data-dir="4" onclick="switchTab(4)">
    <span class="num">04</span><span class="label">rika tv</span>
  </button>
  <div class="tab-spacer"></div>
  <button class="sidebar-toggle" onclick="toggleSidebar()">
    <span>NOTES</span>
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 3L9 7L5 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</div>

<div class="main-area">
  <iframe class="proto-frame" id="protoFrame" src="prototypes/d1-rikaos.html"></iframe>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-inner" id="sidebarContent"></div>
  </div>
</div>

<script>
const protoFiles = {
  1: 'prototypes/d1-rikaos.html',
  '1b': 'prototypes/d1v2-ghibli.html',
  '1c': 'prototypes/d1v3-holographic.html',
  '1d': 'prototypes/d1v4-terrarium.html',
  3: 'prototypes/d3-petridish.html',
  4: 'prototypes/d4-rikatv.html',
};

const sidebarData = {
  1: {
    title: 'RikaOS — Kawaii Pastel',
    subtitle: 'Tech-playful. "You just booted up someone\'s personal computer and found a whole world inside." Warm pastels, wobble animations, kawaii SVG icons.',
    strengths: [
      'Strongest metaphor for a developer — the site IS a computer she built',
      'Custom SVG kawaii icons (waving hand, dripping grilled cheese, torii gate)',
      'Musical icon scale — hover all 8 icons in order to unlock a melody',
      'Window snap to edges, dock bounce, physics desktop toys on double-click',
      'Canvas ripple watermark with color bloom effect'
    ],
    tradeoffs: [
      'Desktop OS metaphors have been done — personality is what makes it stand out',
      'Window management complexity on mobile',
      'Boot sequence could feel slow on repeat visits (skip option included)'
    ],
    complexity: 'High — custom window manager, drag/resize/snap, Web Audio musical scale, physics toys, canvas watermark, command palette, terminal.',
    mobile: 'Transforms to phone-OS launcher with app grid.',
    recruiter: 'High — projects.app front and center. Terminal impresses technical recruiters.'
  },
  '1b': {
    title: 'RikaOS — Ghibli / Alive',
    subtitle: 'Hand-painted & breathing. "The OS looks like a Studio Ghibli background that came to life." Warm parchment, ink brush art, wooden textures.',
    strengths: [
      'Unique aesthetic nobody has done — hand-painted OS with watercolor sky',
      'Animated sky shifts dawn→day→dusk over 60s cycle',
      'Soot sprites wander the desktop, cherry blossom petals fall',
      'Japanese pentatonic (miyako-bushi) musical scale on icon hover',
      'Ink brush SVG icons (ensō circle, calligraphy scroll, tea cup with steam)',
      'Wooden shelf taskbar with red hanko stamp start button'
    ],
    tradeoffs: [
      'Organic aesthetic may feel less "techy" at first glance',
      'Paper unfurl window animations need to feel crisp',
      'Heavily themed — some users may not connect with it'
    ],
    complexity: 'High — animated watercolor sky, paper grain texture, soot sprite AI, ink brush icons, calligraphy terminal, wood grain textures.',
    mobile: 'Full-screen windows with simplified particles.',
    recruiter: 'Medium-high — engineering is proven by the craft itself. Projects app is clearly accessible.'
  },
  '1c': {
    title: 'RikaOS — Holographic Chaos',
    subtitle: 'Beautiful digital destruction. "A malfunctioning holographic projector that\'s GORGEOUS." Iridescent rainbow, glitch artifacts, RGB separation.',
    strengths: [
      'Most visually striking — holographic mesh gradient with scan lines and CRT vignette',
      'Periodic global glitch every 15-30s (horizontal tear + static crackle)',
      'Holographic card icons with tilt-shimmer on hover',
      'Day mode is the surprise — "defragmented" clean white aesthetic (inverted default)',
      'Windows materialize from glitch lines, dissolve into pixel scatter on close',
      'Synth minor pentatonic scale with bitcrushed blips'
    ],
    tradeoffs: [
      'Dark-by-default may not suit all contexts',
      'Heavy visual effects — performance sensitive',
      'Glitch aesthetic can feel chaotic if overdone'
    ],
    complexity: 'Highest — animated holographic gradients, RGB chromatic aberration, scan lines, CRT vignette, glitch tear system, pixel dissolve animations, VHS boot sequence.',
    mobile: 'Simplified effects, full-screen windows.',
    recruiter: 'High — the sheer technical craft speaks for itself. Projects accessible via dock.'
  },
  '1d': {
    title: 'RikaOS — Terrarium',
    subtitle: 'Living glass ecosystems. "The desktop is a terrarium viewed from above. Content lives in glass domes. Everything grows and breathes."',
    strengths: [
      'Most original concept — nobody has done a terrarium OS',
      'Miniature terrarium icons (zen garden in jar, compost with cute worms, bark radio)',
      'Glass dome windows with condensation, frosted glass headers',
      'Pollen particles, mist layer, CSS butterfly with figure-8 path',
      'Wooden potting bench taskbar with sprouting seed start button',
      'Night mode: bioluminescent mushrooms + fireflies'
    ],
    tradeoffs: [
      'Organic metaphor is furthest from "tech" — engineering must be proven by craft',
      'Many layered effects (pebbles, condensation, mist, butterflies) — performance risk',
      'Glass dome window style may reduce readability'
    ],
    complexity: 'Highest — terrarium floor textures, glass dome refraction, condensation animation, butterfly physics, pollen/mist particles, bioluminescent night mode.',
    mobile: 'Full-screen windows, hidden butterfly and condensation.',
    recruiter: 'Medium — the wow factor is memorable. Projects accessible through icons.'
  },
  3: {
    title: 'The Petri Dish',
    subtitle: 'Bold-unusual. "The one nobody else would ever do. Uncomfortable with how bold it is."',
    strengths: [
      'Strongest metaphor alignment — literally connects microbiology past to engineering present',
      'Zoom-based navigation is genuinely novel for portfolios',
      'Visual impact is immediate — pulsing colonies on agar are mesmerizing',
      'Every element has meaning (mitochondria = tech stack is hilarious AND informative)'
    ],
    tradeoffs: [
      'Polarizing — some people won\'t "get it" or might find it strange',
      'Zoom navigation has a learning curve (mitigated by guided first experience)',
      'Canvas/WebGL rendering adds significant technical overhead'
    ],
    complexity: 'Highest — Canvas/CSS animation for colonies, zoom/pan camera system, Perlin noise, progressive content loading based on zoom level, fermentation game.',
    mobile: 'Discrete zoom steps (tap to zoom in, pinch gesture). Swipe between colonies at same zoom level. Simplified colony animations.',
    recruiter: 'Medium — requires zooming into engineering colony. But the novelty factor makes the site memorable and shareable.'
  },
  4: {
    title: 'rika tv',
    subtitle: 'Funny-entertaining. "This is entertainment. The site is a Japanese variety show and you\'re the audience."',
    strengths: [
      'Most entertaining direction — channel-surfing is inherently fun',
      'Each channel format perfectly matches its content type',
      'Strong personality expression through show formats and chyrons',
      'CRT effects and remote control are immediately engaging'
    ],
    tradeoffs: [
      'TV metaphor is less directly connected to engineering than OS or lab',
      'Many channels to build — each needs its own visual identity',
      'Risk of style over substance if show formats overshadow actual content'
    ],
    complexity: 'High — channel transition animations, CRT shader effects, 6 distinct channel layouts, draggable remote control, keyboard shortcuts, news ticker, chyron system.',
    mobile: 'Swipe between channels (like stories). Bottom channel indicator. Remote control becomes bottom bar. Fullscreen immersive experience.',
    recruiter: 'High — Channel 2 (Code Review) is a dedicated engineering showcase. Channel-surfing makes exploring natural.'
  }
};

let currentDir = 1;
let sidebarOpen = false;

function switchTab(dir) {
  currentDir = dir;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.tab[data-dir="${dir}"]`).classList.add('active');
  document.getElementById('protoFrame').src = protoFiles[dir];
  renderSidebar();
}

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById('sidebar').classList.toggle('open', sidebarOpen);
  document.querySelector('.sidebar-toggle').classList.toggle('open', sidebarOpen);
  if (sidebarOpen) renderSidebar();
}

function renderSidebar() {
  const d = sidebarData[currentDir];
  if (!d) return;
  document.getElementById('sidebarContent').innerHTML = `
    <div class="sb-title">${d.title}</div>
    <div class="sb-subtitle">${d.subtitle}</div>
    <div class="sb-divider"></div>

    <div class="sb-section">
      <div class="sb-label">Strengths</div>
      <ul class="sb-list">${d.strengths.map(s => `<li>${s}</li>`).join('')}</ul>
    </div>

    <div class="sb-section">
      <div class="sb-label">Trade-offs</div>
      <ul class="sb-list tradeoffs">${d.tradeoffs.map(s => `<li>${s}</li>`).join('')}</ul>
    </div>

    <div class="sb-divider"></div>

    <div class="sb-section">
      <div class="sb-label">Technical Complexity</div>
      <div class="sb-complexity">${d.complexity}</div>
    </div>

    <div class="sb-section">
      <div class="sb-label">Mobile Strategy</div>
      <div class="sb-complexity">${d.mobile}</div>
    </div>

    <div class="sb-section">
      <div class="sb-label">Recruiter Clarity</div>
      <div class="sb-complexity">${d.recruiter}</div>
    </div>
  `;
}

// Keyboard shortcuts
const tabKeys = ['1', '2', '3', '4', '5', '6'];
const tabOrder = [1, '1b', '1c', '1d', 3, 4];
document.addEventListener('keydown', e => {
  const idx = tabKeys.indexOf(e.key);
  if (idx !== -1 && !e.metaKey && !e.ctrlKey && !e.altKey) {
    if (document.activeElement !== document.getElementById('protoFrame')) {
      switchTab(tabOrder[idx]);
    }
  }
  if (e.key === 'Escape' && sidebarOpen) {
    toggleSidebar();
  }
});

// Init sidebar content
renderSidebar();
</script>
</body>
</html>
