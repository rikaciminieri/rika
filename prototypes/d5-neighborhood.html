<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rika's Neighborhood — Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ========== RESET & ROOT ========== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  /* Day palette */
  --sky: #87CEEB;
  --sky-gradient-top: #5bb5e0;
  --sky-gradient-bottom: #b8e4f9;
  --ground: #90b77d;
  --ground-dark: #7aa066;
  --path-color: #d4c5a0;
  --path-border: #b8a882;

  /* Night palette */
  --sky-night: #1a1a2e;
  --sky-night-top: #0f0f1e;
  --sky-night-bottom: #1a1a2e;
  --ground-night: #2d4a3e;
  --ground-night-dark: #1f3a2e;
  --path-night: #5a5040;
  --path-night-border: #4a4030;

  /* Building colors */
  --warm1: #f5e6d0;
  --warm2: #e8d5b7;
  --cool1: #d4e4f7;
  --cool2: #c8dae8;
  --wood: #c4956a;
  --roof-red: #ff6b6b;
  --light-yellow: #ffd93d;
  --cherry: #ffb7c5;

  /* UI */
  --text: #2d2d2d;
  --text-light: #666;
  --text-dark-mode: #e8e8e8;
  --accent: #ff6b6b;

  /* Transition */
  --mode-transition: 0.8s ease;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: 'Inter', 'Noto Sans JP', sans-serif;
  background: var(--sky);
  transition: background var(--mode-transition);
}

body.night {
  background: var(--sky-night);
}

/* ========== SKY ========== */
#sky {
  position: fixed;
  inset: 0;
  background: linear-gradient(180deg, var(--sky-gradient-top) 0%, var(--sky-gradient-bottom) 60%, var(--ground) 100%);
  transition: background var(--mode-transition);
  z-index: 0;
}

body.night #sky {
  background: linear-gradient(180deg, var(--sky-night-top) 0%, var(--sky-night-bottom) 60%, var(--ground-night) 100%);
}

/* Sun */
#sun {
  position: fixed;
  top: 40px;
  right: 80px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: #ffd93d;
  box-shadow: 0 0 40px 15px rgba(255,217,61,0.4);
  transition: opacity 0.6s, transform 0.6s;
  z-index: 1;
}
body.night #sun { opacity: 0; transform: translateY(30px); }

/* Moon */
#moon {
  position: fixed;
  top: 50px;
  right: 100px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: #e8e8e8;
  box-shadow: 0 0 30px 10px rgba(232,232,232,0.2);
  opacity: 0;
  transform: translateY(-30px);
  transition: opacity 0.6s, transform 0.6s;
  z-index: 1;
}
body.night #moon { opacity: 1; transform: translateY(0); }

#moon::after {
  content: '';
  position: absolute;
  top: -5px;
  right: -8px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--sky-night);
  transition: background var(--mode-transition);
}

/* Stars */
.star {
  position: fixed;
  width: 2px;
  height: 2px;
  background: #fff;
  border-radius: 50%;
  opacity: 0;
  transition: opacity 0.8s;
  z-index: 1;
}
body.night .star { opacity: 1; }
.star.twinkle { animation: twinkle 3s infinite alternate; }
@keyframes twinkle {
  0% { opacity: 0.3; }
  100% { opacity: 1; }
}

/* Clouds */
.cloud {
  position: fixed;
  z-index: 1;
  opacity: 0.7;
  animation: cloudDrift 60s linear infinite;
}
body.night .cloud { opacity: 0.1; }
.cloud-shape {
  background: white;
  border-radius: 50%;
  position: absolute;
}

@keyframes cloudDrift {
  0% { transform: translateX(-200px); }
  100% { transform: translateX(calc(100vw + 200px)); }
}

/* ========== WORLD CONTAINER ========== */
#world {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

#world.zoomed {
  pointer-events: none;
}

/* ========== ISOMETRIC GROUND ========== */
#iso-container {
  transform: rotateX(60deg) rotateZ(-45deg);
  transform-style: preserve-3d;
  width: 900px;
  height: 700px;
  position: relative;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

#ground-plane {
  position: absolute;
  inset: -100px;
  background: var(--ground);
  border-radius: 20px;
  transition: background var(--mode-transition);
  box-shadow: 0 5px 30px rgba(0,0,0,0.2);
}
body.night #ground-plane { background: var(--ground-night); }

/* Grass texture */
#ground-plane::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.05) 0%, transparent 50%),
              radial-gradient(circle at 70% 60%, rgba(0,0,0,0.05) 0%, transparent 50%);
  border-radius: 20px;
}

/* ========== PATHS ========== */
.path {
  position: absolute;
  background: var(--path-color);
  border: 1px solid var(--path-border);
  transition: background var(--mode-transition), border-color var(--mode-transition);
  z-index: 1;
}
body.night .path { background: var(--path-night); border-color: var(--path-night-border); }

/* ========== BUILDINGS ========== */
.building {
  position: absolute;
  cursor: pointer;
  transform-style: preserve-3d;
  transition: transform 0.3s ease, filter 0.3s;
  z-index: 10;
}

.building:hover {
  transform: translateZ(8px);
  filter: brightness(1.08);
}

.building:hover .building-label {
  opacity: 1;
  transform: translateZ(60px) translateY(-10px);
}

/* Building label */
.building-label {
  position: absolute;
  top: -30px;
  left: 50%;
  transform: translateZ(50px) translateX(-50%);
  background: rgba(0,0,0,0.8);
  color: white;
  padding: 4px 12px;
  border-radius: 12px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
  z-index: 100;
}

/* Building glow on hover */
.building::after {
  content: '';
  position: absolute;
  inset: -10px;
  border-radius: 8px;
  background: radial-gradient(ellipse, rgba(255,217,61,0.3), transparent 70%);
  opacity: 0;
  transition: opacity 0.3s;
  z-index: -1;
}
.building:hover::after { opacity: 1; }
body.night .building:hover::after {
  background: radial-gradient(ellipse, rgba(255,217,61,0.5), transparent 70%);
}

/* Generic building face */
.bld-top {
  position: absolute;
  transform-origin: bottom;
  transform-style: preserve-3d;
}

.bld-front, .bld-side, .bld-roof {
  position: absolute;
}

/* ========== INDIVIDUAL BUILDINGS (Isometric CSS) ========== */

/* 1. Apartment (About) */
#b-apartment {
  left: 80px;
  top: 100px;
  width: 140px;
  height: 120px;
}

.apartment-base {
  width: 140px;
  height: 120px;
  background: var(--warm1);
  border: 2px solid var(--warm2);
  border-radius: 4px;
  position: relative;
  transform: translateZ(0px);
  transform-style: preserve-3d;
}

.apartment-base::before {
  content: '';
  position: absolute;
  bottom: 100%;
  left: 0;
  right: 0;
  height: 80px;
  background: var(--warm1);
  border: 2px solid var(--warm2);
  border-bottom: none;
  border-radius: 4px 4px 0 0;
}

.apartment-roof {
  position: absolute;
  top: -100px;
  left: -8px;
  width: 156px;
  height: 30px;
  background: var(--roof-red);
  clip-path: polygon(8% 100%, 50% 0%, 92% 100%);
}

.apartment-window {
  position: absolute;
  width: 20px;
  height: 24px;
  background: #fff8e1;
  border: 2px solid var(--warm2);
  border-radius: 2px;
}
body.night .apartment-window {
  background: var(--light-yellow);
  box-shadow: 0 0 10px rgba(255,217,61,0.5);
}

.apartment-door {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 24px;
  height: 36px;
  background: var(--wood);
  border: 2px solid #a07850;
  border-bottom: none;
  border-radius: 4px 4px 0 0;
}

.apartment-balcony {
  position: absolute;
  top: -60px;
  right: 10px;
  width: 40px;
  height: 6px;
  background: #999;
  border-radius: 2px;
}
.apartment-balcony::before {
  content: '🌿';
  position: absolute;
  top: -14px;
  left: 4px;
  font-size: 10px;
}

.apartment-plant {
  position: absolute;
  bottom: 2px;
  font-size: 10px;
}

/* 2. Workshop (Engineering) */
#b-workshop {
  left: 320px;
  top: 60px;
  width: 160px;
  height: 130px;
}

.workshop-base {
  width: 160px;
  height: 130px;
  background: var(--cool1);
  border: 2px solid var(--cool2);
  border-radius: 4px;
  position: relative;
}

.workshop-roof {
  position: absolute;
  top: -20px;
  left: -5px;
  width: 170px;
  height: 20px;
  background: #666;
  border-radius: 2px;
}

.workshop-chimney {
  position: absolute;
  top: -50px;
  right: 20px;
  width: 16px;
  height: 35px;
  background: #888;
  border: 2px solid #777;
  border-radius: 2px 2px 0 0;
}

.chimney-smoke {
  position: absolute;
  top: -12px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  opacity: 0.5;
  animation: smokeRise 2s ease-out infinite;
}

@keyframes smokeRise {
  0% { transform: translateX(-50%) translateY(0); opacity: 0.5; }
  100% { transform: translateX(-50%) translateY(-20px); opacity: 0; }
}

.workshop-window-big {
  position: absolute;
  width: 45px;
  height: 50px;
  background: rgba(200,218,232,0.5);
  border: 2px solid var(--cool2);
  border-radius: 2px;
}
body.night .workshop-window-big {
  background: rgba(255,217,61,0.3);
  box-shadow: 0 0 8px rgba(255,217,61,0.3);
}

.workshop-sign {
  position: absolute;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 8px;
  font-weight: 700;
  color: #444;
  letter-spacing: 1px;
  background: rgba(255,255,255,0.7);
  padding: 2px 6px;
  border-radius: 2px;
}

.workshop-gear {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 14px;
  animation: gearSpin 8s linear infinite;
}

@keyframes gearSpin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* 3. Tea House (Japan) */
#b-teahouse {
  left: 580px;
  top: 140px;
  width: 150px;
  height: 110px;
}

.teahouse-base {
  width: 150px;
  height: 110px;
  background: var(--warm1);
  border: 2px solid var(--warm2);
  border-radius: 4px;
  position: relative;
}

.teahouse-roof {
  position: absolute;
  top: -28px;
  left: -12px;
  width: 174px;
  height: 32px;
  background: #555;
  clip-path: polygon(5% 100%, 15% 20%, 50% 0%, 85% 20%, 95% 100%);
  border-radius: 50% 50% 0 0;
}

.teahouse-roof::after {
  content: '';
  position: absolute;
  top: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  height: 12px;
  background: #666;
  clip-path: polygon(10% 100%, 50% 0%, 90% 100%);
}

.teahouse-door {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 40px;
  height: 50px;
  background: #f0e6d2;
  border: 2px solid var(--warm2);
  border-bottom: none;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
}
.teahouse-door span {
  background: rgba(255,255,255,0.3);
}

.teahouse-lantern {
  position: absolute;
  font-size: 12px;
}

.stone-lantern {
  position: absolute;
  bottom: -20px;
  right: -25px;
  width: 12px;
  height: 20px;
  background: #999;
  border-radius: 2px;
  z-index: 5;
}
.stone-lantern::before {
  content: '';
  position: absolute;
  top: -6px;
  left: -3px;
  width: 18px;
  height: 6px;
  background: #888;
  border-radius: 2px;
}
body.night .stone-lantern::after {
  content: '';
  position: absolute;
  top: 4px;
  left: 3px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--light-yellow);
  box-shadow: 0 0 8px rgba(255,217,61,0.6);
}

/* 4. Pirate Ship (One Piece) */
#b-pirate {
  left: 600px;
  top: 380px;
  width: 170px;
  height: 100px;
}

.ship-hull {
  width: 170px;
  height: 60px;
  background: var(--wood);
  border: 2px solid #a07850;
  border-radius: 0 0 40% 40%;
  position: relative;
  top: 40px;
}

.ship-hull::before {
  content: '';
  position: absolute;
  top: -2px;
  left: -8px;
  right: -8px;
  height: 8px;
  background: #a07850;
  border-radius: 4px;
}

.ship-mast {
  position: absolute;
  top: -55px;
  left: 50%;
  transform: translateX(-50%);
  width: 4px;
  height: 90px;
  background: #8B6914;
}

.ship-sail {
  position: absolute;
  top: -50px;
  left: 50%;
  transform: translateX(-50%);
  width: 50px;
  height: 40px;
  background: white;
  border: 2px solid #ddd;
  border-radius: 0 0 50% 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  animation: sailSway 4s ease-in-out infinite alternate;
}

@keyframes sailSway {
  0% { transform: translateX(-50%) skewX(-2deg); }
  100% { transform: translateX(-50%) skewX(2deg); }
}

.ship-flag {
  position: absolute;
  top: -60px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 14px;
  animation: flagWave 2s ease-in-out infinite alternate;
}

@keyframes flagWave {
  0% { transform: translateX(-50%) rotate(-5deg); }
  100% { transform: translateX(-50%) rotate(5deg); }
}

.ship-window {
  position: absolute;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #f0e6d2;
  border: 2px solid #a07850;
}
body.night .ship-window {
  background: var(--light-yellow);
  box-shadow: 0 0 6px rgba(255,217,61,0.4);
}

.water-patch {
  position: absolute;
  bottom: -25px;
  left: -15px;
  right: -15px;
  height: 30px;
  background: rgba(135,206,235,0.4);
  border-radius: 50%;
  animation: waterWobble 3s ease-in-out infinite alternate;
}
body.night .water-patch {
  background: rgba(26,26,46,0.4);
}

@keyframes waterWobble {
  0% { transform: scaleX(0.95); }
  100% { transform: scaleX(1.05); }
}

/* 5. Food Truck (Grilled Cheese) */
#b-foodtruck {
  left: 100px;
  top: 380px;
  width: 150px;
  height: 90px;
}

.truck-body {
  width: 150px;
  height: 70px;
  background: var(--roof-red);
  border: 2px solid #e55;
  border-radius: 8px;
  position: relative;
  top: 20px;
}

.truck-body::before {
  content: '';
  position: absolute;
  top: -15px;
  left: 20px;
  right: 20px;
  height: 15px;
  background: #ff8080;
  border-radius: 8px 8px 0 0;
  border: 2px solid #e55;
  border-bottom: none;
}

.truck-window {
  position: absolute;
  top: 10px;
  left: 15px;
  right: 15px;
  height: 28px;
  background: #fff8e1;
  border: 2px solid #e55;
  border-radius: 4px;
}

.truck-awning {
  position: absolute;
  top: -2px;
  left: -8px;
  right: -8px;
  height: 14px;
  background: repeating-linear-gradient(
    90deg,
    #ff6b6b 0px,
    #ff6b6b 10px,
    white 10px,
    white 20px
  );
  border-radius: 4px;
  transform: scaleY(0.6) translateY(-8px);
}

.truck-sign {
  position: absolute;
  top: -28px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Caveat', cursive;
  font-size: 11px;
  font-weight: 700;
  color: white;
  background: var(--roof-red);
  padding: 1px 8px;
  border-radius: 6px;
  white-space: nowrap;
}

.truck-wheel {
  position: absolute;
  bottom: -8px;
  width: 14px;
  height: 14px;
  background: #444;
  border-radius: 50%;
  border: 2px solid #333;
}
.truck-wheel::after {
  content: '';
  position: absolute;
  inset: 3px;
  background: #666;
  border-radius: 50%;
}

/* 6. Gallery */
#b-gallery {
  left: 340px;
  top: 320px;
  width: 160px;
  height: 120px;
}

.gallery-base {
  width: 160px;
  height: 120px;
  background: white;
  border: 2px solid #ddd;
  border-radius: 4px;
  position: relative;
}

.gallery-glass {
  position: absolute;
  top: 10px;
  left: 10px;
  right: 10px;
  height: 60px;
  background: linear-gradient(135deg, rgba(200,220,240,0.3), rgba(255,255,255,0.1));
  border: 2px solid #ccc;
  border-radius: 2px;
}

.gallery-sign {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Space Grotesk', sans-serif;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 3px;
  color: #666;
}

.gallery-frame {
  position: absolute;
  width: 16px;
  height: 12px;
  border: 2px solid #b89060;
  background: linear-gradient(135deg, #e8d0b0, #f0e0c0);
}

.gallery-roof {
  position: absolute;
  top: -12px;
  left: -5px;
  right: -5px;
  height: 14px;
  background: #eee;
  border: 2px solid #ddd;
  border-radius: 2px;
}

/* ========== CHERRY BLOSSOM TREE ========== */
#cherry-tree {
  position: absolute;
  left: 500px;
  top: 260px;
  z-index: 15;
  cursor: pointer;
}

.tree-trunk {
  width: 8px;
  height: 30px;
  background: #8B6914;
  border-radius: 2px;
  margin: 0 auto;
}

.tree-canopy {
  width: 50px;
  height: 40px;
  background: var(--cherry);
  border-radius: 50%;
  margin-top: -10px;
  position: relative;
  animation: treeSway 5s ease-in-out infinite alternate;
}

.tree-canopy::before {
  content: '';
  position: absolute;
  top: -8px;
  left: 8px;
  width: 35px;
  height: 30px;
  background: #ffc4d6;
  border-radius: 50%;
}

.tree-canopy::after {
  content: '';
  position: absolute;
  top: 5px;
  right: -5px;
  width: 25px;
  height: 25px;
  background: #ffaac0;
  border-radius: 50%;
}

@keyframes treeSway {
  0% { transform: rotate(-1deg); }
  100% { transform: rotate(1deg); }
}

/* Falling petals */
.petal {
  position: absolute;
  width: 6px;
  height: 6px;
  background: var(--cherry);
  border-radius: 50% 0 50% 50%;
  opacity: 0.7;
  animation: petalFall var(--petal-duration, 6s) linear infinite;
  animation-delay: var(--petal-delay, 0s);
  z-index: 20;
}

@keyframes petalFall {
  0% { transform: translate(0, 0) rotate(0deg); opacity: 0.7; }
  25% { transform: translate(15px, 30px) rotate(90deg); opacity: 0.6; }
  50% { transform: translate(-5px, 60px) rotate(180deg); opacity: 0.5; }
  75% { transform: translate(20px, 90px) rotate(270deg); opacity: 0.3; }
  100% { transform: translate(10px, 120px) rotate(360deg); opacity: 0; }
}

/* Extra petals on burst */
.petal-burst {
  animation: petalBurst 1.5s ease-out forwards;
}

@keyframes petalBurst {
  0% { transform: translate(0, 0) scale(1); opacity: 1; }
  100% { transform: translate(var(--bx, 40px), var(--by, -30px)) scale(0.3); opacity: 0; }
}

/* ========== WALKING CAT ========== */
#walking-cat {
  position: absolute;
  top: 300px;
  font-size: 14px;
  z-index: 15;
  animation: catWalk 20s linear infinite;
  pointer-events: none;
}

@keyframes catWalk {
  0% { left: 0px; top: 300px; }
  25% { left: 300px; top: 280px; }
  50% { left: 500px; top: 350px; }
  75% { left: 200px; top: 400px; }
  100% { left: 0px; top: 300px; }
}

/* ========== STREET SIGN ========== */
#street-sign {
  position: absolute;
  left: 250px;
  top: 260px;
  z-index: 15;
  cursor: pointer;
}

.sign-post {
  width: 4px;
  height: 35px;
  background: #777;
  margin: 0 auto;
}

.sign-board {
  background: #4a7c59;
  color: white;
  padding: 3px 8px;
  border-radius: 2px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 7px;
  font-weight: 600;
  text-align: center;
  line-height: 1.4;
  white-space: nowrap;
  border: 1px solid #3a6c49;
}

/* ========== MANHOLE ========== */
#manhole {
  position: absolute;
  left: 400px;
  top: 480px;
  width: 28px;
  height: 28px;
  background: #888;
  border-radius: 50%;
  border: 2px solid #777;
  cursor: pointer;
  z-index: 5;
  display: flex;
  align-items: center;
  justify-content: center;
}
#manhole::before {
  content: '+';
  color: #666;
  font-weight: bold;
  font-size: 14px;
}

.manhole-bubble {
  position: absolute;
  bottom: 35px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  color: white;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 10px;
  font-family: 'Caveat', cursive;
  width: 180px;
  text-align: center;
  line-height: 1.4;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.manhole-bubble.show { opacity: 1; }

/* ========== STREETLAMPS ========== */
.streetlamp {
  position: absolute;
  z-index: 8;
}
.lamp-pole {
  width: 3px;
  height: 28px;
  background: #666;
  margin: 0 auto;
}
.lamp-head {
  width: 12px;
  height: 6px;
  background: #888;
  border-radius: 6px 6px 0 0;
  margin: 0 auto;
  position: relative;
}
body.night .lamp-head::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 50%;
  transform: translateX(-50%);
  width: 6px;
  height: 4px;
  background: var(--light-yellow);
  border-radius: 50%;
  box-shadow: 0 0 15px 5px rgba(255,217,61,0.4);
}

/* ========== SPEECH BUBBLE ========== */
.speech-bubble {
  position: absolute;
  background: white;
  border: 2px solid #ddd;
  border-radius: 12px;
  padding: 6px 10px;
  font-family: 'Caveat', cursive;
  font-size: 12px;
  color: #333;
  white-space: nowrap;
  z-index: 50;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.speech-bubble::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 20px;
  width: 0;
  height: 0;
  border-left: 6px solid transparent;
  border-right: 6px solid transparent;
  border-top: 8px solid white;
}

/* ========== OPENING ANIMATION ========== */
.anim-ground { animation: fadeSlideUp 0.4s ease-out both; animation-delay: 0s; }
.anim-foundations { animation: fadeSlideUp 0.3s ease-out both; animation-delay: 0.3s; }
.anim-walls { animation: riseUp 0.4s ease-out both; }
.anim-roof { animation: dropDown 0.3s ease-out both; }
.anim-details { animation: popIn 0.3s ease-out both; }
.anim-bubble { animation: popIn 0.4s ease-out both; animation-delay: 1.8s; }

@keyframes fadeSlideUp {
  0% { opacity: 0; transform: translateY(20px); }
  100% { opacity: 1; transform: translateY(0); }
}

@keyframes riseUp {
  0% { opacity: 0; transform: scaleY(0); transform-origin: bottom; }
  100% { opacity: 1; transform: scaleY(1); transform-origin: bottom; }
}

@keyframes dropDown {
  0% { opacity: 0; transform: translateY(-15px); }
  60% { transform: translateY(3px); }
  100% { opacity: 1; transform: translateY(0); }
}

@keyframes popIn {
  0% { opacity: 0; transform: scale(0.5); }
  70% { transform: scale(1.1); }
  100% { opacity: 1; transform: scale(1); }
}

/* Stagger each building */
#b-apartment .anim-walls { animation-delay: 0.5s; }
#b-apartment .anim-roof { animation-delay: 0.8s; }
#b-workshop .anim-walls { animation-delay: 0.6s; }
#b-workshop .anim-roof { animation-delay: 0.9s; }
#b-teahouse .anim-walls { animation-delay: 0.7s; }
#b-teahouse .anim-roof { animation-delay: 1.0s; }
#b-pirate .anim-walls { animation-delay: 0.8s; }
#b-pirate .anim-roof { animation-delay: 1.1s; }
#b-foodtruck .anim-walls { animation-delay: 0.9s; }
#b-foodtruck .anim-roof { animation-delay: 1.2s; }
#b-gallery .anim-walls { animation-delay: 1.0s; }
#b-gallery .anim-roof { animation-delay: 1.3s; }

.anim-details { animation-delay: 1.5s; }

/* ========== INTERIOR VIEW ========== */
#interior-overlay {
  position: fixed;
  inset: 0;
  z-index: 1000;
  display: none;
  opacity: 0;
  transition: opacity 0.4s;
}

}

#interior-content {

<script>
// ========== STATE ==========
let isNight = false;
let lang = 'en';
let currentInterior = null;
let manholeOpen = false;

// ========== DAY/NIGHT ==========
function toggleDayNight() {
  isNight = !isNight;
  document.body.classList.toggle('night', isNight);
  document.getElementById('mode-toggle').textContent = isNight ? '🌙' : '☀️';
}

// ========== STARS ==========
(function createStars() {
  for (let i = 0; i < 60; i++) {
    const star = document.createElement('div');
    star.className = 'star' + (Math.random() > 0.5 ? ' twinkle' : '');
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 50 + '%';
    star.style.animationDelay = Math.random() * 3 + 's';
    star.style.width = (1 + Math.random() * 2) + 'px';
    star.style.height = star.style.width;
    document.body.appendChild(star);
  }
})();

// ========== LANGUAGE TOGGLE ==========
function toggleLanguage() {
  lang = lang === 'en' ? 'jp' : 'en';
  document.querySelectorAll('[data-en]').forEach(el => {
    const text = el.getAttribute('data-' + lang);
    if (text) el.textContent = text;
  });
  // Re-render interior if open
  if (currentInterior) {
    renderInterior(currentInterior);
  }
}

// ========== MANHOLE ==========
function toggleManhole() {
  manholeOpen = !manholeOpen;
  document.getElementById('manhole-bubble').classList.toggle('show', manholeOpen);
}

// ========== CHERRY BLOSSOM BURST ==========
function burstPetals(tree) {
  for (let i = 0; i < 15; i++) {
    const petal = document.createElement('div');
    petal.className = 'petal petal-burst';
    petal.style.left = (15 + Math.random() * 20) + 'px';
    petal.style.top = (Math.random() * 10) + 'px';
    petal.style.setProperty('--bx', (Math.random() * 120 - 60) + 'px');
    petal.style.setProperty('--by', (Math.random() * -80 - 20) + 'px');
    petal.style.animationDelay = (Math.random() * 0.3) + 's';
    tree.appendChild(petal);
    setTimeout(() => petal.remove(), 1800);
  }
}

// ========== APARTMENT DOOR EASTER EGG ==========
(function() {
  const apt = document.getElementById('b-apartment');
  let clickCount = 0;
  let clickTimer = null;
  const door = apt.querySelector('.apartment-door');

  apt.addEventListener('click', function(e) {
    // Only count clicks near the door area
    clickCount++;
    clearTimeout(clickTimer);
    clickTimer = setTimeout(() => { clickCount = 0; }, 2000);

    if (clickCount === 3) {
      e.stopPropagation();
      e.preventDefault();
      clickCount = 0;
      const bubble = document.createElement('div');
      bubble.className = 'speech-bubble';
      bubble.style.top = '-50px';
      bubble.style.left = '30px';
      bubble.style.zIndex = '100';
      bubble.textContent = lang === 'en' ? 'coming! 🏃‍♀️' : 'ちょっと待って！🏃‍♀️';
      apt.appendChild(bubble);
      setTimeout(() => bubble.remove(), 2000);
      return false;
    }
  });
})();

// ========== OPEN / CLOSE INTERIOR ==========
function openInterior(id) {
  currentInterior = id;
  const overlay = document.getElementById('interior-overlay');
  renderInterior(id);
  overlay.classList.add('active');
  overlay.style.display = 'flex';
  requestAnimationFrame(() => { overlay.style.opacity = '1'; });
}

function closeInterior() {
  const overlay = document.getElementById('interior-overlay');
  overlay.style.opacity = '0';
  setTimeout(() => {
    overlay.classList.remove('active');
    overlay.style.display = 'none';
    currentInterior = null;
  }, 400);
}

// Close on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && currentInterior) closeInterior();
});

// ========== RENDER INTERIORS ==========
function renderInterior(id) {
  const body = document.getElementById('interior-body');
  const en = lang === 'en';

  switch(id) {
    case 'apartment':
      body.innerHTML = renderApartment(en);
      break;
    case 'workshop':
      body.innerHTML = renderWorkshop(en);
      break;
    case 'teahouse':
      body.innerHTML = renderTeaHouse(en);
      break;
    case 'pirate':
      body.innerHTML = renderPirate(en);
      break;
    case 'foodtruck':
      body.innerHTML = renderFoodTruck(en);
      break;
    case 'gallery':
      body.innerHTML = renderGallery(en);
      break;
  }
}

        <button class="reaction-btn" onclick="this.classList.toggle('selected')">🎨</button>
        <button class="reaction-btn" onclick="this.classList.toggle('selected')">✨</button>
        <button class="reaction-btn" onclick="this.classList.toggle('selected')">🏠</button>
      </div>
    </div>
  `;
}

setTimeout(() => {
  const bubble = document.getElementById('welcome-bubble');
  if (bubble) {
    bubble.style.transition = 'opacity 1s';
    bubble.style.opacity = '0';
    setTimeout(() => bubble.remove(), 1000);
  }
}, 5000);

</script>
