<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RikaOS — Holographic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #08080f;
  --surface: #12121f;
  --surface-2: #1a1a2e;
  --border: #2a2a44;
  --text: #e0e0f0;
  --text-muted: #6a6a8a;
  --accent: #00ffcc;
  --accent-glow: rgba(0, 255, 204, 0.2);
  --pink: #ff3399;
  --blue: #3366ff;
  --gold: #ffcc00;
  --red: #ff4444;
  --green: #33ff99;
  --taskbar-h: 88px;
  --radius: 12px;
  --win-header: 40px;
  --font: 'Inter', 'Noto Sans JP', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --display: 'Space Grotesk', 'Noto Sans JP', sans-serif;
}

/* Day mode = "defragmented" / repaired — the surprise */
body.day-mode {
  --bg: #f0f0f8;
  --surface: #ffffff;
  --surface-2: #e8e8f0;
  --border: #d0d0e0;
  --text: #1a1a2e;
  --text-muted: #6a6a8a;
  --accent: #0088aa;
  --accent-glow: rgba(0, 136, 170, 0.15);
  --pink: #cc2277;
  --blue: #2255cc;
  --gold: #cc9900;
  --red: #cc3333;
  --green: #22aa66;
}

body.day-mode .desktop-bg { background: var(--bg); }
body.day-mode .desktop-bg::before { opacity: 0; }
body.day-mode .scanlines { opacity: 0; }
body.day-mode .taskbar { background: rgba(255,255,255,0.85); border-color: rgba(0,136,170,0.2); }
body.day-mode .boot-screen-wrap { background: #f0f0f8; }
body.day-mode .window { border-color: var(--border); box-shadow: 0 8px 32px rgba(0,0,0,0.08); }
body.day-mode .window::before { opacity: 0; }
body.day-mode .holo-particle { opacity: 0.15; }
body.day-mode .terminal { background: #1a1a2e; }

html, body { height: 100%; overflow: hidden; font-family: var(--font); background: var(--bg); color: var(--text); }

/* =================== BOOT SEQUENCE =================== */
#boot-screen {
  position: fixed; inset: 0; z-index: 99999;
  background: #000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-family: var(--mono);
  transition: opacity 0.8s;
  overflow: hidden;
}
#boot-screen.done { opacity: 0; pointer-events: none; }

/* Static noise overlay for boot */
.boot-static {
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.03) 0px,
    rgba(255,255,255,0.03) 1px,
    transparent 1px,
    transparent 2px
  );
  animation: bootStatic 0.1s steps(4) infinite;
  pointer-events: none;
}
@keyframes bootStatic {
  0% { transform: translateY(0); }
  25% { transform: translateY(-2px); }
  50% { transform: translateY(1px); }
  75% { transform: translateY(-1px); }
  100% { transform: translateY(0); }
}

/* Tracking bars */
.boot-tracking {
  position: absolute; left: 0; right: 0;
  height: 30px;
  background: linear-gradient(180deg, transparent, rgba(255,255,255,0.08), transparent);
  animation: trackingBars 2s ease-in-out infinite;
  pointer-events: none;
}
@keyframes trackingBars {
  0% { top: -30px; }
  100% { top: 110%; }
}

.boot-signal {
  font-family: var(--mono);
  font-size: 16px;
  color: var(--green);
  text-shadow: 0 0 10px var(--green), 0 0 30px rgba(51,255,153,0.3);
  opacity: 0;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  animation: signalFlicker 0.5s ease-out 0.8s forwards;
}
@keyframes signalFlicker {
  0% { opacity: 0; }
  20% { opacity: 1; }
  30% { opacity: 0.3; }
  50% { opacity: 1; }
  60% { opacity: 0.6; }
  100% { opacity: 1; }
}

.boot-lines { font-size: 11px; color: #4a4a6a; text-align: left; width: 440px; max-width: 90vw; margin-top: 24px; }
.boot-lines div { opacity: 0; animation: bootFade 0.3s forwards; }
.boot-lines .ok { color: var(--green); text-shadow: 0 0 6px rgba(51,255,153,0.3); }
.boot-lines .warn { color: var(--gold); text-shadow: 0 0 6px rgba(255,204,0,0.3); }
@keyframes bootFade { to { opacity: 1; } }

.boot-bar { width: 440px; max-width: 90vw; height: 2px; background: #1a1a2e; border-radius: 2px; margin-top: 20px; overflow: hidden; }
.boot-bar-fill { height: 100%; width: 0; background: linear-gradient(90deg, var(--accent), var(--pink), var(--blue)); border-radius: 2px; animation: bootFill 2.2s ease-in-out forwards; box-shadow: 0 0 12px var(--accent); }
@keyframes bootFill { to { width: 100%; } }

/* =================== DESKTOP =================== */
#desktop {
  position: fixed; inset: 0;
  opacity: 0;
  transition: opacity 1s 0.3s;
  display: flex;
  flex-direction: column;
}
#desktop.visible { opacity: 1; }

/* Holographic mesh gradient backdrop */
.desktop-bg {
  position: fixed; inset: 0;
  z-index: -1;
  background: var(--bg);
  overflow: hidden;
}
.desktop-bg::before {
  content: '';
  position: absolute;
  width: 200%; height: 200%;
  top: -50%; left: -50%;
  background:
    radial-gradient(ellipse 600px 500px at 20% 30%, rgba(0,255,204,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 500px 600px at 80% 25%, rgba(255,51,153,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 500px 400px at 55% 75%, rgba(51,102,255,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 400px 500px at 15% 80%, rgba(255,204,0,0.04) 0%, transparent 60%);
  animation: holoDrift 25s ease-in-out infinite alternate;
  transition: opacity 0.5s;
}
@keyframes holoDrift {
  0% { transform: translate(0, 0) rotate(0deg) scale(1); }
  25% { transform: translate(40px, -30px) rotate(1.5deg) scale(1.02); }
  50% { transform: translate(-30px, 20px) rotate(-1deg) scale(0.98); }
  75% { transform: translate(20px, 10px) rotate(0.5deg) scale(1.01); }
  100% { transform: translate(-10px, -15px) rotate(-0.5deg) scale(1); }
}

/* Scan lines overlay */
.scanlines {
  position: fixed; inset: 0;
  z-index: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent 0px,
    transparent 1px,
    rgba(255,255,255,0.015) 1px,
    rgba(255,255,255,0.015) 2px
  );
  animation: scanScroll 8s linear infinite;
  transition: opacity 0.5s;
}
@keyframes scanScroll {
  0% { transform: translateY(0); }
  100% { transform: translateY(40px); }
}

/* CRT vignette */
.crt-vignette {
  position: fixed; inset: 0;
  z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.4) 100%);
}

/* Global glitch tear */
.desktop-glitch {
  animation: none;
}
.desktop-glitch.active {
  animation: glitchTear 0.15s steps(2) forwards;
}
@keyframes glitchTear {
  0% { clip-path: inset(0 0 0 0); transform: translateX(0); }
  25% { clip-path: inset(30% 0 40% 0); transform: translateX(8px); filter: hue-rotate(90deg); }
  50% { clip-path: inset(60% 0 10% 0); transform: translateX(-5px); filter: hue-rotate(180deg); }
  75% { clip-path: inset(10% 0 70% 0); transform: translateX(3px); filter: hue-rotate(270deg); }
  100% { clip-path: inset(0 0 0 0); transform: translateX(0); filter: none; }
}

/* Watermark canvas */
.watermark-canvas {
  position: fixed;
  right: 0; bottom: 0;
  pointer-events: none;
  z-index: 0;
}

/* Holographic floating particles */
.floating-particles {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
}
.holo-particle {
  position: absolute;
  opacity: 0;
  animation: holoFloat linear infinite;
  transition: opacity 0.5s;
}
.holo-particle.shard {
  width: 0; height: 0;
  border-left: 4px solid transparent;
  border-right: 4px solid transparent;
  border-bottom: 8px solid var(--accent);
  filter: blur(0.5px);
}
.holo-particle.line {
  width: 30px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}
@keyframes holoFloat {
  0% { opacity: 0; transform: translateY(100vh) rotate(0deg); }
  10% { opacity: 0.4; }
  90% { opacity: 0.4; }
  100% { opacity: 0; transform: translateY(-10vh) rotate(180deg); }
}

/* =================== DESKTOP ICONS =================== */
.desktop-icons {
  flex: 1;
  padding: 24px;
  display: flex;
  flex-direction: column;
  flex-wrap: wrap;
  gap: 8px;
  align-content: start;
  max-width: 200px;
}

.desktop-icon {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px;
  width: 84px; height: 84px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
  perspective: 600px;
}
.desktop-icon:hover { background: rgba(0,255,204,0.04); }
.desktop-icon:active { transform: scale(0.95); }

.desktop-icon .icon-img {
  width: 54px; height: 54px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  overflow: hidden;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  background: var(--surface-2);
  border: 1px solid var(--border);
  /* Holographic iridescent gradient */
  background-image: linear-gradient(135deg, rgba(0,255,204,0.08), rgba(255,51,153,0.06), rgba(51,102,255,0.08));
}

.desktop-icon:hover .icon-img {
  transform: scale(1.08) rotateY(8deg) rotateX(-4deg);
  border-color: var(--accent);
  box-shadow: 0 0 16px rgba(0,255,204,0.2), 2px 0 8px rgba(255,51,153,0.15), -2px 0 8px rgba(51,102,255,0.15);
  background-image: linear-gradient(135deg, rgba(0,255,204,0.15), rgba(255,51,153,0.12), rgba(51,102,255,0.15), rgba(255,204,0,0.1));
}

.desktop-icon .icon-label {
  font-size: 10px;
  color: var(--text-muted);
  text-align: center;
  line-height: 1.2;
  max-width: 80px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* =================== WINDOWS =================== */
.window {
  position: absolute;
  background: rgba(18, 18, 31, 0.85);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex; flex-direction: column;
  min-width: 320px; min-height: 200px;
  overflow: hidden;
  animation: winMaterialize 0.45s cubic-bezier(0.16, 1, 0.3, 1);
  /* RGB chromatic aberration */
  box-shadow:
    2px 0 0 rgba(255,51,153,0.08),
    -2px 0 0 rgba(51,102,255,0.08),
    0 8px 32px rgba(0,0,0,0.4);
}
/* Animated holographic border */
.window::before {
  content: '';
  position: absolute; inset: -1px;
  border-radius: var(--radius);
  background: linear-gradient(var(--holo-angle, 0deg), var(--accent), var(--pink), var(--blue), var(--gold), var(--accent));
  z-index: -1;
  mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  mask-composite: exclude;
  -webkit-mask-composite: xor;
  padding: 1px;
  opacity: 0.4;
  transition: opacity 0.3s;
}
.window.focused::before { opacity: 0.8; }

@keyframes winMaterialize {
  0% { transform: scaleY(0.02) scaleX(1); opacity: 0; filter: brightness(3) hue-rotate(90deg); }
  30% { transform: scaleY(0.02) scaleX(1); opacity: 1; filter: brightness(2); }
  50% { transform: scaleY(0.5) scaleX(1.02); filter: brightness(1.5) hue-rotate(45deg); }
  75% { transform: scaleY(1.02) scaleX(0.99); filter: brightness(1.1); }
  100% { transform: scaleY(1) scaleX(1); opacity: 1; filter: none; }
}

.window.minimized { animation: winMin 0.25s forwards; pointer-events: none; }
@keyframes winMin {
  to { transform: scaleY(0.02) scaleX(0.5); opacity: 0; filter: brightness(2); }
}

.window.focused {
  box-shadow:
    2px 0 0 rgba(255,51,153,0.12),
    -2px 0 0 rgba(51,102,255,0.12),
    0 12px 48px rgba(0,0,0,0.5),
    0 0 30px var(--accent-glow);
}

.win-header {
  height: var(--win-header);
  background: rgba(26, 26, 46, 0.9);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 12px;
  cursor: grab;
  user-select: none;
  flex-shrink: 0;
  border-radius: var(--radius) var(--radius) 0 0;
}
.win-header:active { cursor: grabbing; }

.win-dots { display: flex; gap: 7px; }
.win-dot {
  width: 13px; height: 13px; border-radius: 50%; border: none;
  cursor: pointer; transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s;
}
.win-dot:hover { transform: scale(1.3); }
.win-dot.close { background: var(--red); box-shadow: 0 0 6px rgba(255,68,68,0.4); }
.win-dot.minimize { background: var(--gold); box-shadow: 0 0 6px rgba(255,204,0,0.3); }
.win-dot.maximize { background: var(--green); box-shadow: 0 0 6px rgba(51,255,153,0.3); }

.win-title { flex: 1; text-align: center; font-size: 12px; font-weight: 500; color: var(--text-muted); pointer-events: none; font-family: var(--mono); letter-spacing: 0.03em; }

.win-body { flex: 1; overflow: auto; padding: 20px; }
.win-body::-webkit-scrollbar { width: 4px; }
.win-body::-webkit-scrollbar-track { background: transparent; }
.win-body::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; opacity: 0.5; }

.win-resize { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: nwse-resize; }

/* =================== TASKBAR (FLOATING HOLOGRAPHIC BAR) =================== */
.taskbar {
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  height: auto;
  width: auto;
  max-width: 90vw;
  background: rgba(18, 18, 31, 0.8);
  backdrop-filter: blur(20px) saturate(1.5);
  border: 1px solid rgba(0,255,204,0.12);
  border-top: 1px solid;
  border-image: linear-gradient(90deg, var(--accent), var(--pink), var(--blue), var(--gold), var(--accent)) 1;
  border-image-slice: 1;
  border-radius: 18px;
  display: flex; align-items: center;
  padding: 8px 16px;
  z-index: 9000;
  gap: 4px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 20px rgba(0,255,204,0.05);
  /* override border-image for border-radius */
  border: 1px solid rgba(0,255,204,0.15);
  overflow: hidden;
}
/* Top holographic edge */
.taskbar::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), var(--pink), var(--blue), var(--gold), var(--accent), transparent);
  animation: holoShift 4s linear infinite;
}
@keyframes holoShift {
  0% { background-position: 0% 0%; }
  100% { background-position: 200% 0%; }
}

.tb-start {
  width: 40px; height: 40px;
  border-radius: 12px;
  border: 1px solid rgba(0,255,204,0.3);
  background: linear-gradient(135deg, rgba(0,255,204,0.15), rgba(255,51,153,0.1));
  color: var(--accent);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  font-weight: 700;
  font-family: var(--display);
  text-shadow: 0 0 8px var(--accent);
  position: relative;
}
.tb-start:hover {
  transform: scale(1.15) rotate(-5deg);
  box-shadow: 0 0 20px rgba(0,255,204,0.3);
  border-color: var(--accent);
}

.tb-divider { width: 1px; height: 28px; background: var(--border); margin: 0 8px; }

.tb-apps { display: flex; gap: 3px; flex: 1; overflow-x: auto; }

.tb-app {
  padding: 6px 14px; border-radius: 10px; border: none;
  background: transparent; color: var(--text-muted);
  font-family: var(--font); font-size: 12px;
  cursor: pointer; white-space: nowrap;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  display: flex; align-items: center; gap: 6px;
}
.tb-app:hover { background: rgba(0,255,204,0.08); color: var(--text); transform: translateY(-2px); }
.tb-app.active { background: rgba(0,255,204,0.12); color: var(--accent); }
.tb-app .tb-app-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 4px var(--accent); }

.tb-tray { display: flex; align-items: center; gap: 12px; margin-left: auto; font-size: 12px; color: var(--text-muted); }
.tb-tray-btn {
  background: none; border: 1px solid transparent;
  color: var(--text-muted); cursor: pointer; font-size: 11px;
  font-family: var(--mono); transition: all 0.15s;
  padding: 4px 8px; border-radius: 6px;
  letter-spacing: 0.05em;
}
.tb-tray-btn:hover { color: var(--accent); background: rgba(0,255,204,0.06); border-color: rgba(0,255,204,0.2); }
#clock { font-family: var(--mono); font-size: 12px; color: var(--text-muted); }

/* Language binary switch */
.lang-toggle-seg {
  display: flex; border-radius: 6px; overflow: hidden;
  border: 1px solid var(--border);
  background: var(--surface-2);
}
.lang-seg {
  padding: 3px 10px; border: none; background: transparent;
  font-family: var(--mono); font-size: 11px; font-weight: 600;
  color: var(--text-muted); cursor: pointer; transition: all 0.15s;
}
.lang-seg.active {
  background: var(--accent); color: #08080f;
  text-shadow: none;
  box-shadow: 0 0 8px var(--accent-glow);
}
.lang-seg:hover:not(.active) { background: rgba(0,255,204,0.08); }

/* =================== COMMAND PALETTE =================== */
.cmd-overlay {
  position: fixed; inset: 0; background: rgba(8,8,15,0.7); backdrop-filter: blur(10px);
  z-index: 50000; display: none; align-items: flex-start; justify-content: center; padding-top: 20vh;
}
.cmd-overlay.open { display: flex; }
.cmd-box {
  width: 560px; max-width: 90vw; background: var(--surface);
  border: 1px solid var(--border); border-radius: 16px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 40px rgba(0,255,204,0.1);
  overflow: hidden; animation: cmdOpen 0.15s ease-out;
}
@keyframes cmdOpen { from { transform: scale(0.94) translateY(-12px); opacity: 0; } }
.cmd-input {
  width: 100%; padding: 16px 20px; background: transparent;
  border: none; outline: none; color: var(--text);
  font-family: var(--font); font-size: 16px;
  border-bottom: 1px solid var(--border);
}
.cmd-input::placeholder { color: var(--text-muted); }
.cmd-results { max-height: 320px; overflow-y: auto; }
.cmd-item {
  padding: 10px 20px; cursor: pointer; display: flex; align-items: center; gap: 12px;
  transition: background 0.1s; font-size: 14px;
}
.cmd-item:hover, .cmd-item.selected { background: rgba(0,255,204,0.08); }
.cmd-item .cmd-icon { font-size: 14px; width: 28px; text-align: center; font-family: var(--mono); color: var(--accent); }
.cmd-item .cmd-label { flex: 1; }
.cmd-item .cmd-hint { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }

/* =================== CONTEXT MENU =================== */
.ctx-menu {
  position: fixed; background: rgba(18,18,31,0.95); backdrop-filter: blur(12px);
  border: 1px solid var(--border); border-radius: 12px; padding: 6px;
  min-width: 200px; box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 16px rgba(0,255,204,0.05);
  z-index: 60000; display: none; animation: ctxOpen 0.12s ease-out;
}
@keyframes ctxOpen { from { transform: scale(0.95); opacity: 0; } }
.ctx-menu.open { display: block; }
.ctx-item {
  padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px;
  display: flex; align-items: center; gap: 10px; transition: background 0.1s; color: var(--text);
}
.ctx-item:hover { background: rgba(0,255,204,0.1); }
.ctx-item .ctx-icon { width: 20px; text-align: center; font-family: var(--mono); font-size: 11px; color: var(--accent); }
.ctx-sep { height: 1px; background: var(--border); margin: 4px 8px; }

/* =================== APP: WELCOME =================== */
.notepad-content { font-family: var(--font); font-size: 14px; line-height: 1.8; color: var(--text); }
.notepad-content h2 {
  font-family: var(--display); font-size: 22px; font-weight: 700; margin-bottom: 12px;
  background: linear-gradient(135deg, var(--accent), var(--pink), var(--blue));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.notepad-content p { margin-bottom: 12px; }
.notepad-content .aside { color: var(--text-muted); font-style: italic; font-size: 13px; }

/* =================== APP: TERMINAL =================== */
.terminal {
  font-family: var(--mono); font-size: 13px; line-height: 1.7;
  color: var(--green); background: #060610; padding: 20px; height: 100%;
  border-radius: 0 0 var(--radius) var(--radius);
  /* CRT phosphor glow */
  text-shadow: 0 0 3px rgba(51,255,153,0.3);
  position: relative;
}
/* CRT flicker */
.terminal::before {
  content: '';
  position: absolute; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent 0px,
    transparent 1px,
    rgba(51,255,153,0.02) 1px,
    rgba(51,255,153,0.02) 2px
  );
  pointer-events: none;
  animation: termFlicker 0.08s steps(2) infinite;
}
@keyframes termFlicker {
  0% { opacity: 1; }
  50% { opacity: 0.98; }
  100% { opacity: 1; }
}
.terminal .prompt { color: var(--accent); text-shadow: 0 0 6px rgba(0,255,204,0.4); }
.terminal .cmd-text { color: var(--text); text-shadow: none; }
.terminal .output { color: var(--text-muted); white-space: pre-wrap; text-shadow: none; }
.terminal .error { color: var(--red); text-shadow: 0 0 4px rgba(255,68,68,0.3); }
.terminal .highlight { color: var(--gold); text-shadow: 0 0 4px rgba(255,204,0,0.3); }
.term-input-line { display: flex; align-items: center; gap: 0; }
.term-input {
  background: transparent; border: none; outline: none;
  color: var(--text); font-family: var(--mono); font-size: 13px;
  flex: 1; caret-color: var(--accent);
}

/* =================== APP: PROJECTS =================== */
.projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
.project-card {
  background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px;
  padding: 20px; cursor: pointer; transition: all 0.2s;
}
.project-card:hover {
  border-color: var(--accent); transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3), 0 0 12px rgba(0,255,204,0.08);
}
.project-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
.project-card p { font-size: 12px; color: var(--text-muted); line-height: 1.5; margin-bottom: 10px; }
.project-card .tags { display: flex; gap: 6px; flex-wrap: wrap; }
.project-card .tag {
  font-family: var(--mono); font-size: 10px; padding: 3px 8px; border-radius: 6px;
  background: rgba(0,255,204,0.08); color: var(--accent);
  border: 1px solid rgba(0,255,204,0.15);
}

/* =================== APP: GALLERY =================== */
.gallery-scroll { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 16px; scroll-snap-type: x mandatory; }
.gallery-scroll::-webkit-scrollbar { height: 4px; }
.gallery-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.gallery-item { flex-shrink: 0; width: 260px; scroll-snap-align: start; }
.gallery-thumb {
  width: 100%; height: 200px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 48px; margin-bottom: 10px;
  border: 1px solid var(--border);
  position: relative; overflow: hidden;
}
.gallery-thumb svg { width: 64px; height: 64px; }
.gallery-item h4 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.gallery-item p { font-size: 12px; color: var(--text-muted); }

/* =================== APP: GRILLED CHEESE =================== */
.gc-podium { display: flex; align-items: flex-end; justify-content: center; gap: 16px; margin-bottom: 32px; }
.gc-podium-item { text-align: center; padding: 16px; border-radius: 10px; background: var(--surface-2); border: 1px solid var(--border); }
.gc-podium-item.gold { border-color: var(--gold); box-shadow: 0 0 12px rgba(255,204,0,0.15); order: 2; }
.gc-podium-item.silver { border-color: #94a3b8; order: 1; }
.gc-podium-item.bronze { border-color: #d97706; order: 3; }
.gc-medal { font-size: 28px; font-family: var(--display); font-weight: 700; }
.gc-medal.gold-medal { color: var(--gold); text-shadow: 0 0 8px rgba(255,204,0,0.4); }
.gc-medal.silver-medal { color: #94a3b8; }
.gc-medal.bronze-medal { color: #d97706; }
.gc-name { font-size: 14px; font-weight: 600; margin-top: 8px; }
.gc-score { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }
.gc-bracket { display: flex; gap: 40px; align-items: center; overflow-x: auto; padding: 16px 0; }
.gc-round { display: flex; flex-direction: column; gap: 20px; flex-shrink: 0; }
.gc-match { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.gc-matchup { padding: 8px 14px; font-size: 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
.gc-matchup:last-child { border-bottom: none; }
.gc-matchup.winner { color: var(--accent); font-weight: 600; text-shadow: 0 0 4px rgba(0,255,204,0.2); }

/* =================== APP: FINDER (TRASH) =================== */
.finder { height: 100%; display: flex; flex-direction: column; }
.finder-toolbar { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--surface-2); font-size: 12px; color: var(--text-muted); }
.finder-path { font-family: var(--mono); font-size: 11px; color: var(--text-muted); flex: 1; }
.finder-list { flex: 1; overflow-y: auto; }
.finder-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.02);
  cursor: pointer;
  transition: background 0.1s;
  font-size: 13px;
}
.finder-item:hover { background: rgba(0,255,204,0.04); }
.finder-item.disabled { opacity: 0.35; cursor: not-allowed; }
.finder-item.disabled:hover { background: transparent; }
.finder-item .fi-icon { width: 28px; text-align: center; flex-shrink: 0; }
.finder-item .fi-icon svg { width: 20px; height: 20px; display: inline-block; vertical-align: middle; }
.finder-item .fi-name { flex: 1; }
.finder-item .fi-meta { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }
.finder-item .fi-size { font-size: 11px; color: var(--text-muted); font-family: var(--mono); min-width: 60px; text-align: right; }

.finder-preview { padding: 24px; animation: fadeIn 0.2s; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.finder-preview h3 { font-size: 16px; margin-bottom: 12px; font-family: var(--display); color: var(--accent); }
.finder-preview p { font-size: 13px; color: var(--text-muted); line-height: 1.7; margin-bottom: 8px; }
.finder-preview-back { font-size: 12px; color: var(--accent); cursor: pointer; margin-bottom: 16px; display: inline-block; }
.finder-preview-back:hover { text-decoration: underline; }

/* =================== APP: CURRENTLY INTO =================== */
.currently-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.currently-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
.currently-card h4 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 8px; font-family: var(--mono); }
.currently-card .item { font-size: 13px; padding: 4px 0; display: flex; align-items: center; gap: 8px; }
.currently-card .item-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 4px currentColor; }

/* =================== CURSOR TRAIL =================== */
.cursor-dot {
  position: fixed;
  width: 6px; height: 6px;
  pointer-events: none;
  z-index: 99998;
  opacity: 0.6;
  transition: opacity 0.3s, transform 0.3s;
  /* Holographic diamond shape */
  background: var(--accent);
  clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
}
.cursor-dot:nth-child(odd) { background: var(--pink); }
.cursor-dot:nth-child(3n) { background: var(--blue); }
.cursor-dot.fade { opacity: 0; transform: scale(0) rotate(90deg); }

/* =================== MOBILE =================== */
@media (max-width: 768px) {
  .desktop-icons { flex-direction: row; flex-wrap: wrap; max-width: 100%; justify-content: center; padding: 16px; }
  .window { position: fixed !important; inset: 0 !important; width: 100vw !important; height: calc(100vh - var(--taskbar-h)) !important; border-radius: 0 !important; min-width: unset !important; min-height: unset !important; }
  .watermark-canvas { display: none; }
  .cmd-box { border-radius: 0; }
  .taskbar { left: 8px; right: 8px; transform: none; width: auto; max-width: none; border-radius: 14px; bottom: 8px; padding: 6px 12px; }
  .crt-vignette { display: none; }
}

/* =================== SCREENSAVER =================== */
.screensaver {
  position: fixed; inset: 0; background: #000; z-index: 80000;
  display: none; cursor: pointer; overflow: hidden;
}
.screensaver.active { display: block; }

/* Static noise for screensaver */
.screensaver-noise {
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.15'/%3E%3C/svg%3E");
  animation: staticNoise 0.15s steps(5) infinite;
}
@keyframes staticNoise {
  0% { transform: translate(0, 0); }
  20% { transform: translate(-5%, 5%); }
  40% { transform: translate(5%, -5%); }
  60% { transform: translate(-5%, -5%); }
  80% { transform: translate(5%, 5%); }
  100% { transform: translate(0, 0); }
}

.screensaver-text {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: var(--mono);
  font-size: 18px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  text-shadow: 0 0 20px rgba(255,255,255,0.1);
  animation: signalPulse 2s ease-in-out infinite;
}
@keyframes signalPulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.7; }
}

/* =================== KONAMI =================== */
.cheese-rain { position: fixed; inset: 0; pointer-events: none; z-index: 90000; }
.cheese-drop { position: absolute; animation: cheeseFall linear forwards; }
.cheese-drop svg { width: 32px; height: 32px; }
@keyframes cheeseFall { from { transform: translateY(-50px) rotate(0deg); } to { transform: translateY(110vh) rotate(360deg); } }

/* =================== CLOCK TOOLTIP =================== */
.clock-tooltip {
  position: absolute; bottom: calc(var(--taskbar-h) + 8px); right: 12px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 8px 14px; font-size: 12px; color: var(--accent);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3), 0 0 12px rgba(0,255,204,0.1);
  white-space: nowrap; pointer-events: none;
  animation: tooltipFade 0.2s ease-out;
  z-index: 9999;
  font-family: var(--mono);
}
@keyframes tooltipFade { from { opacity: 0; transform: translateY(4px); } }

/* =================== GC WALLPAPER =================== */
.gc-wallpaper {
  position: fixed; inset: 0; z-index: 1;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.5s;
  overflow: hidden;
}
.gc-wallpaper.show { opacity: 0.2; }

/* =================== CSS ICON SVG =================== */
.icon-img svg { width: 28px; height: 28px; display: block; }

/* =================== MUSICAL SCALE TOAST =================== */
.melody-toast {
  position: fixed;
  top: 20px; left: 50%; transform: translateX(-50%);
  background: var(--surface);
  border: 1px solid var(--accent);
  border-radius: 10px;
  padding: 10px 20px;
  font-size: 13px;
  color: var(--accent);
  font-family: var(--mono);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3), 0 0 16px rgba(0,255,204,0.15);
  z-index: 99999;
  animation: toastIn 0.3s ease-out, toastOut 0.3s ease-in 2.5s forwards;
  pointer-events: none;
  text-shadow: 0 0 6px rgba(0,255,204,0.3);
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-20px); } }
@keyframes toastOut { to { opacity: 0; transform: translateX(-50%) translateY(-20px); } }

/* =================== DOCK BOUNCE =================== */
@keyframes dockBounce {
  0% { transform: translateY(0); }
  20% { transform: translateY(-10px); }
  40% { transform: translateY(0); }
  55% { transform: translateY(-6px); }
  70% { transform: translateY(0); }
  85% { transform: translateY(-2px); }
  100% { transform: translateY(0); }
}
.tb-app.bouncing { animation: dockBounce 0.6s ease-out; }

/* =================== SNAP INDICATOR =================== */
.snap-indicator {
  position: fixed;
  background: rgba(0, 255, 204, 0.06);
  border: 2px dashed var(--accent);
  border-radius: var(--radius);
  z-index: 50;
  pointer-events: none;
  transition: all 0.15s ease-out;
  box-shadow: 0 0 20px rgba(0,255,204,0.08);
}

/* =================== DESKTOP TOY =================== */
.desktop-toy {
  position: fixed;
  pointer-events: none;
  z-index: 5;
  width: 12px; height: 12px;
  background: transparent;
  /* Holographic diamond */
  clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
  box-shadow: 0 0 8px var(--accent);
}

/* =================== SPARKLE =================== */
@keyframes sparkle {
  0% { transform: scale(0) rotate(0deg); opacity: 1; }
  50% { transform: scale(1.2) rotate(180deg); opacity: 1; }
  100% { transform: scale(0) rotate(360deg); opacity: 0; }
}
.sparkle {
  position: fixed; width: 8px; height: 8px;
  pointer-events: none; z-index: 99999;
  animation: sparkle 0.6s ease-out forwards;
}
.sparkle::before, .sparkle::after {
  content: ''; position: absolute; background: var(--accent); border-radius: 1px;
}
.sparkle::before { width: 100%; height: 2px; top: 50%; left: 0; transform: translateY(-50%); }
.sparkle::after { width: 2px; height: 100%; left: 50%; top: 0; transform: translateX(-50%); }

/* =================== MATRIX RAIN =================== */
.matrix-overlay {
  position: fixed; inset: 0; z-index: 85000;
  background: rgba(0,0,0,0.9);
  pointer-events: none;
  display: none;
}
.matrix-overlay.active { display: block; }
.matrix-col {
  position: absolute; top: 0;
  font-family: var(--mono);
  font-size: 14px;
  color: var(--green);
  text-shadow: 0 0 8px var(--green);
  writing-mode: vertical-lr;
  animation: matrixFall linear forwards;
  white-space: nowrap;
  line-height: 1.2;
}
@keyframes matrixFall {
  from { transform: translateY(-100%); }
  to { transform: translateY(100vh); }
}

/* =================== RADIO VISUALIZER =================== */
.radio-overlay {
  position: fixed; inset: 0; z-index: 85000;
  background: rgba(8,8,15,0.95);
  display: none; align-items: center; justify-content: center;
  flex-direction: column;
  cursor: pointer;
}
.radio-overlay.active { display: flex; }
.radio-bars {
  display: flex; align-items: flex-end; gap: 4px; height: 120px;
}
.radio-bar {
  width: 6px;
  background: linear-gradient(0deg, var(--accent), var(--pink));
  border-radius: 3px 3px 0 0;
  animation: radioBar 0.5s ease-in-out infinite alternate;
  box-shadow: 0 0 6px var(--accent);
}
@keyframes radioBar {
  from { height: 10px; }
  to { height: 100px; }
}
.radio-label {
  font-family: var(--mono); font-size: 12px;
  color: var(--accent); margin-top: 20px;
  letter-spacing: 0.1em; text-transform: uppercase;
}
</style>
</head>
<body>

<!-- BOOT SCREEN -->
<div id="boot-screen">
  <div class="boot-static"></div>
  <div class="boot-tracking"></div>
  <div class="boot-signal" id="bootSignal">SIGNAL ACQUIRED</div>
  <div class="boot-lines" id="bootLines"></div>
  <div class="boot-bar"><div class="boot-bar-fill"></div></div>
</div>

<!-- DESKTOP -->
<div id="desktop" class="desktop-glitch">
  <div class="desktop-bg"></div>
  <div class="scanlines"></div>
  <div class="crt-vignette"></div>
  <div class="floating-particles" id="particles"></div>
  <div class="gc-wallpaper" id="gcWallpaper"></div>
  <canvas class="watermark-canvas" id="watermarkCanvas"></canvas>
  <div class="desktop-icons" id="desktopIcons"></div>
  <div id="windowContainer"></div>

  <!-- Taskbar / Dock -->
  <div class="taskbar">
    <button class="tb-start" id="startBtn" title="Start">R</button>
    <div class="tb-divider"></div>
    <div class="tb-apps" id="tbApps"></div>
    <div class="tb-tray">
      <button class="tb-tray-btn" id="nightToggle" onclick="toggleDayMode()" title="Defragment">DEFRAG</button>
      <div class="lang-toggle-seg" id="langToggle">
        <button class="lang-seg active" data-lang="en" onclick="setLang('en')">EN</button>
        <button class="lang-seg" data-lang="jp" onclick="setLang('jp')">JP</button>
      </div>
      <span id="clock"></span>
    </div>
  </div>
</div>

<!-- Command Palette -->
<div class="cmd-overlay" id="cmdOverlay" onclick="if(event.target===this)closeCmdPalette()">
  <div class="cmd-box">
    <input class="cmd-input" id="cmdInput" placeholder="Search apps, commands, anything..." oninput="filterCommands()" onkeydown="handleCmdKey(event)">
    <div class="cmd-results" id="cmdResults"></div>
  </div>
</div>

<!-- Context Menu -->
<div class="ctx-menu" id="ctxMenu"></div>

<!-- Screensaver (lost signal) -->
<div class="screensaver" id="screensaver" onclick="hideScreensaver()">
  <div class="screensaver-noise"></div>
  <div class="screensaver-text">SIGNAL LOST — CLICK TO RECONNECT</div>
</div>

<!-- Cheese Rain -->
<div class="cheese-rain" id="cheeseRain"></div>

<!-- Matrix Rain -->
<div class="matrix-overlay" id="matrixOverlay"></div>

<!-- Radio Visualizer -->
<div class="radio-overlay" id="radioOverlay" onclick="hideRadio()"></div>

<script>
// =================== STATE ===================
let lang = 'en';
let windows = [];
let nextZ = 100;
let nextWinId = 1;
let focusedWinId = null;
let idleTimer = null;
const IDLE_TIMEOUT = 120000;
let dayMode = false;
let holoAngle = 0;

// Animate holographic border angle
function animateHoloBorder() {
  holoAngle = (holoAngle + 0.5) % 360;
  document.querySelectorAll('.window').forEach(w => {
    w.style.setProperty('--holo-angle', holoAngle + 'deg');
  });
  requestAnimationFrame(animateHoloBorder);
}
requestAnimationFrame(animateHoloBorder);

// Periodic global glitch tear
function scheduleGlitch() {
  const delay = 15000 + Math.random() * 15000; // 15-30s
  setTimeout(() => {
    const desktop = document.getElementById('desktop');
    desktop.classList.add('active');
    setTimeout(() => desktop.classList.remove('active'), 150);
    scheduleGlitch();
  }, delay);
}
scheduleGlitch();

// =================== SOUND SYSTEM ===================
let audioCtx = null;
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
document.addEventListener('click', () => { initAudio(); startAmbientHum(); }, { once: true });

// VHS hum (barely audible)
let ambientNode = null;
function startAmbientHum() {
  if (!audioCtx || ambientNode) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(60, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.003, audioCtx.currentTime);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  ambientNode = osc;
}

function playBoop(freq = 520, duration = 0.08, vol = 0.12, type = 'square') {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(freq * 0.5, audioCtx.currentTime + duration);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

// Bitcrushed blip for icon hover
function playHoverBlip(freq = 800) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.03);
}

// Musical icon scale — synth minor pentatonic
const musicalScale = {
  welcome:   { freq: 220.00, note: 'A3' },
  projects:  { freq: 261.63, note: 'C4' },
  terminal:  { freq: 293.66, note: 'D4' },
  gallery:   { freq: 329.63, note: 'E4' },
  currently: { freq: 392.00, note: 'G4' },
  gc:        { freq: 440.00, note: 'A4' },
  japan:     { freq: 523.25, note: 'C5' },
  trash:     { freq: 587.33, note: 'D5' },
};
const scaleOrder = ['welcome','projects','terminal','gallery','currently','gc','japan','trash'];
let scaleProgress = 0;
let melodyUnlocked = false;

function playScaleNote(appId) {
  const note = musicalScale[appId];
  if (!note) return;
  // Play as synth tone
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(note.freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.2);

  if (scaleOrder[scaleProgress] === appId) {
    scaleProgress++;
    if (scaleProgress >= scaleOrder.length && !melodyUnlocked) {
      melodyUnlocked = true;
      triggerMelodyUnlocked();
    }
  } else if (scaleOrder[0] === appId) {
    scaleProgress = 1;
  } else {
    scaleProgress = 0;
  }
}

function triggerMelodyUnlocked() {
  // Full synth arpeggio
  scaleOrder.forEach((id, i) => {
    setTimeout(() => {
      const note = musicalScale[id];
      if (!audioCtx || !note) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(note.freq, audioCtx.currentTime);
      gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.25);

function playWindowOpen() {
  if (!audioCtx) return;
  // Digital materialize — ascending noise sweep
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(100, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(2000, audioCtx.currentTime + 0.15);
  gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.15);
}

function playWindowClose() {
  if (!audioCtx) return;
  // Descending glitch
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.12);
  gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
  osc.connect(gain).connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.12);
}

function playTypeBoop() {

}

function openApp(appId) {
  const existing = windows.find(w => w.appId === appId && !w.minimized);
  if (existing) { focusWindow(existing.id); return; }

  const existingMin = windows.find(w => w.appId === appId && w.minimized);
  if (existingMin) {
    existingMin.minimized = false;
    const el = document.getElementById(`win-${existingMin.id}`);
    if (el) { el.classList.remove('minimized'); el.style.display = ''; }
    focusWindow(existingMin.id);
    updateTaskbar();
    return;
  }

  const app = apps.find(a => a.id === appId);
  if (!app) return;

  const id = nextWinId++;
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const winW = Math.min(app.w, vw - 40);
  const winH = Math.min(app.h, vh - 100);
  const openCount = windows.filter(w => !w.minimized).length;
  const offsetX = Math.min(220 + openCount * 30, vw - winW - 20);
  const offsetY = Math.min(30 + openCount * 25, vh - winH - 80);

  const win = { id, appId, x: offsetX, y: offsetY, w: winW, h: winH, z: nextZ++, minimized: false };
  windows.push(win);
  renderWindow(win, app);
  focusWindow(id);
  updateTaskbar();

  playWindowOpen();

  setTimeout(() => {
    const tbApp = document.querySelector(`.tb-app[data-app="${appId}"]`);
    if (tbApp) {
      tbApp.classList.add('bouncing');
      tbApp.addEventListener('animationend', () => tbApp.classList.remove('bouncing'), { once: true });
    }
  }, 350);
}

  el.style.top = win.y + 'px';
  el.style.width = win.w + 'px';
  el.style.height = win.h + 'px';
  el.style.zIndex = win.z;
  el.onmousedown = () => focusWindow(win.id);

    <div class="win-header" onmousedown="startDrag(event, ${win.id})">

// =================== WINDOW MANAGEMENT ===================
function focusWindow(id) {
  focusedWinId = id;
  const win = windows.find(w => w.id === id);
  if (win) win.z = nextZ++;
  document.querySelectorAll('.window').forEach(el => {
    el.classList.remove('focused');
    const wid = parseInt(el.id.replace('win-', ''));
    const w = windows.find(x => x.id === wid);
    if (w) el.style.zIndex = w.z;
  });
  const el = document.getElementById(`win-${id}`);
  if (el) el.classList.add('focused');
  updateTaskbar();
}

function closeWindow(id) {
  playWindowClose();
  const el = document.getElementById(`win-${id}`);
  if (el) {
    el.style.transition = 'transform 0.2s, opacity 0.2s, filter 0.2s';
    el.style.transform = 'scaleY(0.02) scaleX(0.5)';
    el.style.filter = 'brightness(3)';
    el.style.opacity = '0';
    setTimeout(() => el.remove(), 200);
  }
  windows = windows.filter(w => w.id !== id);
  if (focusedWinId === id) focusedWinId = null;
  updateTaskbar();
}

function minimizeWindow(id) {
  playBoop(350, 0.08, 0.06, 'square');
  const win = windows.find(w => w.id === id);
  if (win) win.minimized = true;
  const el = document.getElementById(`win-${id}`);
  if (el) el.classList.add('minimized');
  if (focusedWinId === id) focusedWinId = null;
  updateTaskbar();
}

function maximizeWindow(id) {
  const el = document.getElementById(`win-${id}`);
  if (!el) return;
  const win = windows.find(w => w.id === id);
  if (!win) return;
  if (win._maximized) {
    el.style.left = win._prevX + 'px'; el.style.top = win._prevY + 'px';
    el.style.width = win._prevW + 'px'; el.style.height = win._prevH + 'px';
    win._maximized = false;
  } else {
    win._prevX = win.x; win._prevY = win.y; win._prevW = win.w; win._prevH = win.h;
    el.style.left = '0'; el.style.top = '0'; el.style.width = '100vw';
    el.style.height = `calc(100vh - var(--taskbar-h))`;
    win._maximized = true;
  }
  focusWindow(id);
}

// =================== DRAG & RESIZE ===================
let dragState = null;
function startDrag(e, winId) {
  if (e.target.classList.contains('win-dot')) return;
  e.preventDefault();
  const el = document.getElementById(`win-${winId}`);
  const rect = el.getBoundingClientRect();
  dragState = { type: 'drag', winId, startX: e.clientX, startY: e.clientY, origX: rect.left, origY: rect.top };
  focusWindow(winId);
}
function startResize(e, winId) {
  e.preventDefault(); e.stopPropagation();
  const el = document.getElementById(`win-${winId}`);
  const rect = el.getBoundingClientRect();
  dragState = { type: 'resize', winId, startX: e.clientX, startY: e.clientY, origW: rect.width, origH: rect.height };
  focusWindow(winId);
}

// =================== WINDOW SNAP ===================
let snapIndicator = null;
let currentSnapSide = null;
const SNAP_THRESHOLD = 20;

function updateSnapIndicator(mx, my) {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  let side = null;
  if (mx < SNAP_THRESHOLD) side = 'left';
  else if (mx > vw - SNAP_THRESHOLD) side = 'right';
  if (side) {
    if (!snapIndicator) { snapIndicator = document.createElement('div'); snapIndicator.className = 'snap-indicator'; document.body.appendChild(snapIndicator); }
    if (side === 'left') snapIndicator.style.cssText = `left:4px;top:4px;width:${vw/2-8}px;height:${vh-100}px;`;
    else snapIndicator.style.cssText = `left:${vw/2+4}px;top:4px;width:${vw/2-8}px;height:${vh-100}px;`;
  } else { removeSnapIndicator(); }
  return side;
}
function removeSnapIndicator() { if (snapIndicator) { snapIndicator.remove(); snapIndicator = null; } }
function snapWindow(winId, side) {
  const el = document.getElementById(`win-${winId}`); const win = windows.find(w => w.id === winId);
  if (!el || !win) return;
  const vw = window.innerWidth, vh = window.innerHeight;
  if (side === 'left') { el.style.left='4px'; el.style.top='4px'; el.style.width=(vw/2-8)+'px'; el.style.height=(vh-100)+'px'; }
  else { el.style.left=(vw/2+4)+'px'; el.style.top='4px'; el.style.width=(vw/2-8)+'px'; el.style.height=(vh-100)+'px'; }
  win.x=parseInt(el.style.left); win.y=parseInt(el.style.top); win.w=parseInt(el.style.width); win.h=parseInt(el.style.height);
  playBoop(200, 0.05, 0.08, 'square'); setTimeout(() => playBoop(250, 0.03, 0.06, 'square'), 30);
  removeSnapIndicator();
}

document.addEventListener('mousemove', e => {
  if (!dragState) return;
  const el = document.getElementById(`win-${dragState.winId}`);
  if (!el) return;
  const win = windows.find(w => w.id === dragState.winId);
  if (dragState.type === 'drag') {
    const nx = dragState.origX + (e.clientX - dragState.startX);
    const ny = dragState.origY + (e.clientY - dragState.startY);
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
    if (win) { win.x = nx; win.y = ny; win._maximized = false; }
    currentSnapSide = updateSnapIndicator(e.clientX, e.clientY);
  } else if (dragState.type === 'resize') {
    const nw = Math.max(320, dragState.origW + (e.clientX - dragState.startX));
    const nh = Math.max(200, dragState.origH + (e.clientY - dragState.startY));
    el.style.width = nw + 'px'; el.style.height = nh + 'px';
    if (win) { win.w = nw; win.h = nh; }
  }
});
document.addEventListener('mouseup', () => {
  if (dragState && currentSnapSide) { snapWindow(dragState.winId, currentSnapSide); currentSnapSide = null; }
  removeSnapIndicator();
  dragState = null;
});

function updateTaskbar() {
  const container = document.getElementById('tbApps');
  container.innerHTML = '';
  windows.forEach(win => {
    const app = apps.find(a => a.id === win.appId);
    if (!app) return;
    const btn = document.createElement('button');
    btn.className = 'tb-app' + (win.id === focusedWinId && !win.minimized ? ' active' : '');
    btn.dataset.app = win.appId;
    btn.innerHTML = `<span class="tb-app-dot"></span>${app.label()}`;
    btn.onclick = () => {

// =================== CANVAS WATERMARK ===================
const rippleCanvas = document.getElementById('watermarkCanvas');
const rippleCtx = rippleCanvas.getContext('2d');
let rippleW, rippleH;
let rippleGrid, ripplePrevGrid, rippleRefImage;
const RIPPLE_RES = 4;
let rippleGridW, rippleGridH;
const RIPPLE_DAMPING = 0.97;

function initRippleCanvas() {
  rippleW = window.innerWidth;
  rippleH = window.innerHeight;
  rippleCanvas.width = rippleW;
  rippleCanvas.height = rippleH;
  rippleGridW = Math.ceil(rippleW / RIPPLE_RES);
  rippleGridH = Math.ceil(rippleH / RIPPLE_RES);
  rippleGrid = new Float32Array(rippleGridW * rippleGridH);
  ripplePrevGrid = new Float32Array(rippleGridW * rippleGridH);
  renderWatermarkText();
}

function renderWatermarkText() {
  rippleCtx.clearRect(0, 0, rippleW, rippleH);
  const text = lang === 'jp' ? '莉香チミニエリ' : 'RIKA CIMINIERI';
  const fontSize = lang === 'jp' ? 160 : 120;
  const fontFamily = lang === 'jp' ? "'Noto Sans JP', sans-serif" : "'Space Grotesk', sans-serif";
  rippleCtx.font = `800 ${fontSize}px ${fontFamily}`;
  // Holographic color-shift effect via mouse position
  rippleCtx.fillStyle = dayMode ? '#0088aa' : '#00ffcc';
  rippleCtx.globalAlpha = 0.04;
  rippleCtx.textAlign = 'right';
  rippleCtx.textBaseline = 'bottom';
  rippleCtx.fillText(text, rippleW - 60, rippleH - 80);
  rippleCtx.globalAlpha = 1.0;
  rippleRefImage = rippleCtx.getImageData(0, 0, rippleW, rippleH);
  rippleGrid.fill(0);
  ripplePrevGrid.fill(0);
}

function updateWatermark() { renderWatermarkText(); }

let mouseRippleX = -1, mouseRippleY = -1;
let mouseX = 0, mouseY = 0;
document.addEventListener('mousemove', e => {
  mouseRippleX = Math.floor(e.clientX / RIPPLE_RES);
  mouseRippleY = Math.floor(e.clientY / RIPPLE_RES);
  mouseX = e.clientX;
  mouseY = e.clientY;
});

function rippleFrame() {
  if (mouseRippleX >= 1 && mouseRippleX < rippleGridW - 1 && mouseRippleY >= 1 && mouseRippleY < rippleGridH - 1) {
    const idx = mouseRippleY * rippleGridW + mouseRippleX;
    rippleGrid[idx] = 512;
  }
  const newGrid = new Float32Array(rippleGridW * rippleGridH);
  for (let y = 1; y < rippleGridH - 1; y++) {
    for (let x = 1; x < rippleGridW - 1; x++) {
      const idx = y * rippleGridW + x;
      newGrid[idx] = (
        rippleGrid[idx - 1] + rippleGrid[idx + 1] +
        rippleGrid[idx - rippleGridW] + rippleGrid[idx + rippleGridW]
      ) / 2 - ripplePrevGrid[idx];
      newGrid[idx] *= RIPPLE_DAMPING;
    }
  }
  ripplePrevGrid = rippleGrid;
  rippleGrid = newGrid;
  if (!rippleRefImage) return requestAnimationFrame(rippleFrame);
  const imgData = new ImageData(new Uint8ClampedArray(rippleRefImage.data), rippleW, rippleH);
  const pixels = imgData.data;
  for (let y = 1; y < rippleGridH - 1; y++) {
    for (let x = 1; x < rippleGridW - 1; x++) {
      const idx = y * rippleGridW + x;
      const displacement = rippleGrid[idx];
      if (Math.abs(displacement) < 0.5) continue;
      const offsetX = Math.round((rippleGrid[idx - 1] - rippleGrid[idx + 1]) * 0.5);
      const offsetY = Math.round((rippleGrid[idx - rippleGridW] - rippleGrid[idx + rippleGridW]) * 0.5);
      for (let py = 0; py < RIPPLE_RES; py++) {
        for (let px = 0; px < RIPPLE_RES; px++) {
          const destX = x * RIPPLE_RES + px;
          const destY = y * RIPPLE_RES + py;
          const srcX = Math.min(Math.max(destX + offsetX, 0), rippleW - 1);
          const srcY = Math.min(Math.max(destY + offsetY, 0), rippleH - 1);
          const destIdx = (destY * rippleW + destX) * 4;
          const srcIdx = (srcY * rippleW + srcX) * 4;
          pixels[destIdx] = rippleRefImage.data[srcIdx];
          pixels[destIdx + 1] = rippleRefImage.data[srcIdx + 1];
          pixels[destIdx + 2] = rippleRefImage.data[srcIdx + 2];
          pixels[destIdx + 3] = rippleRefImage.data[srcIdx + 3];
          const absDisp = Math.abs(displacement);
          if (absDisp > 3) {
            const bloom = Math.min(absDisp / 25, 1);
            // Holographic color bloom — shifts RGB
            pixels[destIdx] = Math.min(255, pixels[destIdx] + bloom * 30);     // R (teal has low R)
            pixels[destIdx + 1] = Math.min(255, pixels[destIdx + 1] + bloom * 60); // G
            pixels[destIdx + 2] = Math.min(255, pixels[destIdx + 2] + bloom * 50); // B
            pixels[destIdx + 3] = Math.min(255, pixels[destIdx + 3] + bloom * 100);
          }
        }
      }
    }
  }
  rippleCtx.putImageData(imgData, 0, 0);
  requestAnimationFrame(rippleFrame);
}

        pCtx.closePath();
        pCtx.fill();
      }
    }
    wp.appendChild(pCanvas);
    pCanvas.style.width = '100%';
    pCanvas.style.height = '100%';
    wp.classList.add('show');
    setTimeout(() => wp.classList.remove('show'), 3000);
  }
});

// =================== DESKTOP TOY (DOUBLE-CLICK EMPTY SPACE) ===================
document.getElementById('desktop').addEventListener('dblclick', (e) => {
  if (e.target.closest('.desktop-icon, .window, .taskbar')) return;
  spawnDesktopToy(e.clientX, e.clientY);
});

function spawnDesktopToy(x, y) {
  const toy = document.createElement('div');
  toy.className = 'desktop-toy';
  // Random holographic color
  const hue = Math.random() * 360;
  toy.style.background = `hsl(${hue}, 100%, 65%)`;
  toy.style.boxShadow = `0 0 12px hsla(${hue}, 100%, 65%, 0.5)`;
  toy.style.left = x + 'px'; toy.style.top = y + 'px';
  const size = 8 + Math.random() * 12;
  toy.style.width = size + 'px'; toy.style.height = size + 'px';
  document.body.appendChild(toy);
  playBoop(400 + Math.random() * 400, 0.05, 0.06, 'triangle');
  let vx = (Math.random() - 0.5) * 8, vy = -8 - Math.random() * 4;
  const gravity = 0.3, bounce = 0.65, friction = 0.99;
  let px = x, py = y, life = 0;
  function animate() {
    vy += gravity; vx *= friction; px += vx; py += vy;
    const floor = window.innerHeight - 100;
    if (py > floor) { py = floor; vy = -vy * bounce; if (Math.abs(vy) < 1) vy = 0; playBoop(180 + Math.random() * 120, 0.02, 0.03, 'triangle'); }
    if (px < 0 || px > window.innerWidth - 18) { vx = -vx; px = Math.max(0, Math.min(px, window.innerWidth - 18)); }
    toy.style.left = px + 'px'; toy.style.top = py + 'px';
    // Color shift as it moves
    toy.style.filter = `hue-rotate(${life * 3}deg)`;
    life++;
    if (life < 200 && (Math.abs(vx) > 0.1 || Math.abs(vy) > 0.5 || py < floor)) { requestAnimationFrame(animate); }
    else { toy.style.transition = 'opacity 0.5s'; toy.style.opacity = '0'; setTimeout(() => toy.remove(), 500); }
  }
  requestAnimationFrame(animate);
}

// =================== EASTER EGG: MATRIX ===================
function triggerMatrix() {
  const overlay = document.getElementById('matrixOverlay');
  overlay.classList.add('active');
  overlay.innerHTML = '';
  const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEF';
  for (let i = 0; i < 30; i++) {
    const col = document.createElement('div');
    col.className = 'matrix-col';
    col.style.left = (i / 30 * 100) + '%';
    col.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    col.style.animationDelay = Math.random() * 1 + 's';
    col.style.fontSize = (10 + Math.random() * 8) + 'px';
    col.style.opacity = 0.3 + Math.random() * 0.7;
    let text = '';
    for (let j = 0; j < 30; j++) {
      text += chars[Math.floor(Math.random() * chars.length)] + '\n';
    }
    col.textContent = text;
    overlay.appendChild(col);

  setTimeout(() => {
    overlay.classList.remove('active');

}

// =================== EASTER EGG: SHAKE TO GLITCH ===================
let shakeHistory = [];
let shakeLastX = 0, shakeLastY = 0;
document.addEventListener('mousemove', (e) => {
  const dx = Math.abs(e.clientX - shakeLastX);
  const dy = Math.abs(e.clientY - shakeLastY);
  const speed = dx + dy;
  shakeLastX = e.clientX;
  shakeLastY = e.clientY;
  if (speed > 50) {
    shakeHistory.push(Date.now());
    shakeHistory = shakeHistory.filter(t => Date.now() - t < 3000);
    if (shakeHistory.length > 40) {
      shakeHistory = [];
      triggerMaxGlitch();
    }
  }
});

function triggerMaxGlitch() {
  const desktop = document.getElementById('desktop');
  // Maximum glitch for 2 seconds
  desktop.style.animation = 'none';
  let glitchFrames = 0;
  const maxGlitch = setInterval(() => {
    const hue = Math.random() * 360;
    const tx = (Math.random() - 0.5) * 20;
    const ty = (Math.random() - 0.5) * 10;
    const skew = (Math.random() - 0.5) * 5;
    desktop.style.transform = `translate(${tx}px, ${ty}px) skew(${skew}deg)`;
    desktop.style.filter = `hue-rotate(${hue}deg) brightness(${0.8 + Math.random() * 0.6}) contrast(${1 + Math.random() * 0.5})`;
    glitchFrames++;
    if (glitchFrames > 30) {
      clearInterval(maxGlitch);
      // "Repair" snap
      desktop.style.transition = 'all 0.2s ease-out';
      desktop.style.transform = 'none';
      desktop.style.filter = 'none';
      playBoop(1200, 0.05, 0.08, 'sine');
      setTimeout(() => playBoop(880, 0.08, 0.06, 'sine'), 50);
      setTimeout(() => { desktop.style.transition = ''; }, 300);
    }
  }, 60);
  // Glitch sound
  if (audioCtx) {
    for (let i = 0; i < 8; i++) {
      setTimeout(() => playBoop(100 + Math.random() * 2000, 0.05, 0.04, 'sawtooth'), i * 100);
    }
  }
}

// =================== EASTER EGG: HOLD START BUTTON (5s) = RADIO ===================
let startHoldTimer = null;
document.getElementById('startBtn').addEventListener('mousedown', () => {
  startHoldTimer = setTimeout(() => {
    showRadio();
  }, 5000);
});
document.getElementById('startBtn').addEventListener('mouseup', () => { clearTimeout(startHoldTimer); });
document.getElementById('startBtn').addEventListener('mouseleave', () => { clearTimeout(startHoldTimer); });

function showRadio() {
  const overlay = document.getElementById('radioOverlay');
  overlay.classList.add('active');
  overlay.innerHTML = '';
  const bars = document.createElement('div');
  bars.className = 'radio-bars';
  for (let i = 0; i < 16; i++) {
    const bar = document.createElement('div');
    bar.className = 'radio-bar';
    bar.style.animationDuration = (0.3 + Math.random() * 0.4) + 's';
    bar.style.animationDelay = (Math.random() * 0.3) + 's';
    const hue = (i / 16) * 360;
    bar.style.background = `linear-gradient(0deg, hsl(${hue}, 100%, 50%), hsl(${(hue + 60) % 360}, 100%, 65%))`;
    bar.style.boxShadow = `0 0 8px hsla(${hue}, 100%, 50%, 0.4)`;
    bars.appendChild(bar);
  }
  overlay.appendChild(bars);
  const label = document.createElement('div');
  label.className = 'radio-label';
  label.textContent = '// HIDDEN FREQUENCY DETECTED // CLICK TO CLOSE';
  overlay.appendChild(label);

  // Play chiptune
  if (audioCtx) {
    const notes = [523, 587, 659, 784, 880, 784, 659, 587, 523, 440, 392, 440, 523, 659, 784, 880];
    notes.forEach((freq, i) => {
      setTimeout(() => {
        if (!overlay.classList.contains('active')) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.15);
      }, i * 150);
    });
  }
}

function hideRadio() {
  document.getElementById('radioOverlay').classList.remove('active');
}
