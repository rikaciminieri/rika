<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>rika tv / 莉香テレビ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+JP:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================
   RESET & BASE
   ============================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100vw; height: 100vh; overflow: hidden;
  background: #000; font-family: 'Inter', 'Noto Sans JP', sans-serif;
  color: #fff; user-select: none; -webkit-user-select: none;
}

/* ============================================
   CRT SCREEN CONTAINER
   ============================================ */
#crt-screen {
  position: fixed; inset: 0; overflow: hidden;
  border-radius: 18px;
  background: #111;
}

/* Scanlines overlay */
#crt-screen::before {
  content: ''; position: absolute; inset: 0; z-index: 1000;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent, transparent 2px,
    rgba(0,0,0,0.06) 2px, rgba(0,0,0,0.06) 4px
  );
}

/* Vignette overlay */
#crt-screen::after {
  content: ''; position: absolute; inset: 0; z-index: 1001;
  pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.45) 100%);
}

/* Screen curvature via subtle shadow inset */
#screen-curve {
  position: absolute; inset: 0; z-index: 1002; pointer-events: none;
  border-radius: 18px;
  box-shadow: inset 0 0 80px rgba(0,0,0,0.3), inset 0 0 20px rgba(0,0,0,0.2);
}

/* ============================================
   STATIC / NOISE CANVAS
   ============================================ */
#static-canvas {
  position: absolute; inset: 0; z-index: 999;
  opacity: 0; pointer-events: none;
  transition: opacity 0.05s;
}
#static-canvas.active { opacity: 1; }

/* ============================================
   TEST PATTERN
   ============================================ */
#test-pattern {
  position: absolute; inset: 0; z-index: 500;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
#test-pattern .bars {
  display: flex; width: 100%; height: 65%; flex-shrink: 0;
}
#test-pattern .bar {
  flex: 1; height: 100%;
}
#test-pattern .label {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: #111;
  padding: 20px;
}
#test-pattern .label h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(28px, 5vw, 64px);
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #fff;
  text-shadow: 0 0 20px rgba(255,255,255,0.5);
}
#test-pattern .label p {
  font-family: 'Noto Sans JP', sans-serif;
  font-size: clamp(14px, 2vw, 24px);
  color: rgba(255,255,255,0.7);
  margin-top: 8px;
  letter-spacing: 6px;
}
#test-pattern .bottom-bars {
  display: flex; width: 100%; height: 10%;
}
#test-pattern .bottom-bars .bar { flex: 1; }

/* ============================================
   POWER OFF SCREEN
   ============================================ */
#power-off-screen {
  position: absolute; inset: 0; z-index: 2000;
  background: #000;
  display: none;
  align-items: center; justify-content: center;
  cursor: pointer;
}
#power-off-screen.active { display: flex; }
#power-off-screen .power-text {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 24px; color: rgba(255,255,255,0.15);
  letter-spacing: 8px; text-transform: uppercase;
  animation: fadeInOut 3s ease-in-out infinite;
}
@keyframes fadeInOut {
  0%, 100% { opacity: 0.1; }
  50% { opacity: 0.3; }
}

/* ============================================
   MUTE OVERLAY
   ============================================ */
#mute-overlay {
  position: fixed; top: 20px; right: 20px; z-index: 1500;
  background: rgba(0,0,0,0.7); border-radius: 8px; padding: 8px 14px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 14px; color: #ff4444;
  display: none; pointer-events: none;
  border: 1px solid rgba(255,68,68,0.3);
}
#mute-overlay.active { display: block; }

/* ============================================
   SAP / BILINGUAL BADGE
   ============================================ */
#sap-badge {
  position: fixed; top: 20px; left: 20px; z-index: 1500;
  background: rgba(0,0,0,0.7); border-radius: 6px; padding: 6px 12px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 13px; color: #00ccff;
  display: none; pointer-events: none;
  border: 1px solid rgba(0,204,255,0.3);
}
#sap-badge.active { display: block; }

/* ============================================
   CHANNEL INDICATOR
   ============================================ */
#channel-indicator {
  position: fixed; top: 20px; right: 80px; z-index: 1500;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 42px; font-weight: 700;
  color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.5);
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s;
}
#channel-indicator.show { opacity: 1; }

/* ============================================
   CHANNEL CONTENT AREA
   ============================================ */
#channel-content {
  position: absolute; inset: 0; z-index: 100;
  overflow-y: auto; overflow-x: hidden;
}

/* ============================================
   CHANNEL 0: STATIC EASTER EGG
   ============================================ */
.ch0 {
  width: 100%; height: 100%; position: relative;
  display: flex; align-items: center; justify-content: center;
  background: #000;
}
.ch0 canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
.ch0 .subliminal {
  position: absolute; z-index: 2;
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(20px, 4vw, 48px);
  font-weight: 700; color: #fff;
  text-transform: uppercase; letter-spacing: 4px;
  opacity: 0; pointer-events: none;
  text-shadow: 0 0 20px #fff;
}

/* ============================================
   CHANNEL 1: THE RIKA SHOW
   ============================================ */
.ch1 {
  width: 100%; min-height: 100%; position: relative;
  background: linear-gradient(135deg, #1a0a00, #2d1200, #4a1e00, #2d1200);
  padding: 60px 30px 120px;
  overflow: hidden;
}
.ch1 .studio-lights {
  position: absolute; top: -100px; left: 50%; transform: translateX(-50%);
  width: 120%; height: 300px;
  background: radial-gradient(ellipse at center, rgba(255,180,50,0.15) 0%, transparent 70%);
  pointer-events: none;
}
.ch1 .live-badge {
  position: absolute; top: 20px; left: 20px;
  background: #cc0000; color: #fff;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px; font-weight: 700;
  padding: 4px 12px; border-radius: 4px;
  letter-spacing: 3px;
  animation: livePulse 1.5s ease-in-out infinite;
}
@keyframes livePulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.ch1 .show-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(32px, 6vw, 72px);
  font-weight: 800; color: #ffcc44;
  text-align: center; margin-bottom: 40px;
  text-shadow: 0 0 40px rgba(255,200,60,0.3);
  letter-spacing: 2px;
}
.ch1 .interview {
  max-width: 700px; margin: 0 auto;
}
.ch1 .q {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 15px; font-weight: 600;
  color: #ffaa33; margin-top: 28px; margin-bottom: 10px;
  text-transform: uppercase; letter-spacing: 1px;
}
.ch1 .a {
  font-family: 'Inter', sans-serif;
  font-size: 16px; line-height: 1.7;
  color: rgba(255,255,255,0.9);
  padding-left: 16px;
  border-left: 3px solid rgba(255,170,50,0.3);
}
.ch1 .chyron {
  position: fixed; bottom: 40px; left: 0; right: 0; z-index: 200;
  background: linear-gradient(90deg, #cc0000, #aa0000);
  padding: 10px 24px;
  display: flex; align-items: center;
}
.ch1 .chyron .name {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 15px; font-weight: 700; color: #fff;
  white-space: nowrap; letter-spacing: 1px;
  background: rgba(0,0,0,0.3); padding: 4px 14px;
  margin-right: 20px; flex-shrink: 0;
}
.ch1 .ticker-wrap {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: #111; padding: 8px 0; overflow: hidden;
  border-top: 2px solid #cc0000;
}
.ch1 .ticker {
  display: inline-block; white-space: nowrap;
  font-family: 'Inter', sans-serif;
  font-size: 13px; color: #ffcc44;
  animation: tickerScroll 35s linear infinite;
}
@keyframes tickerScroll {
  0% { transform: translateX(100vw); }
  100% { transform: translateX(-200%); }
}

/* ============================================
   CHANNEL 2: CODE REVIEW
   ============================================ */
.ch2 {
  width: 100%; min-height: 100%;
  background: linear-gradient(180deg, #0a0a0a, #141414);
  padding: 40px 30px 60px;
}
.ch2 .header {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 40px;
}
.ch2 .header h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(24px, 4vw, 40px);
  font-weight: 700; color: #e50914;
}
.ch2 .header span {
  font-family: 'Inter', sans-serif;
  font-size: 14px; color: rgba(255,255,255,0.5);
}
.ch2 .projects-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px; margin-bottom: 20px;
}
.ch2 .project-card {
  background: #1a1a1a; border-radius: 8px; overflow: hidden;
  cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
  border: 1px solid rgba(255,255,255,0.06);
}
.ch2 .project-card:hover {
  transform: scale(1.03);
  box-shadow: 0 8px 30px rgba(0,0,0,0.5);
}
.ch2 .project-card .thumb {
  width: 100%; height: 150px; position: relative;
}
.ch2 .project-card .episode {
  position: absolute; top: 8px; left: 8px;
  background: rgba(0,0,0,0.7); border-radius: 4px;
  padding: 2px 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: rgba(255,255,255,0.7);
}
.ch2 .project-card .info { padding: 16px; }
.ch2 .project-card .info h3 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 17px; font-weight: 600; color: #fff;
  margin-bottom: 6px;
}
.ch2 .project-card .info p {
  font-size: 13px; color: rgba(255,255,255,0.6);
  line-height: 1.5; margin-bottom: 10px;
}
.ch2 .project-card .info .tags {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.ch2 .project-card .info .tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: #e50914; background: rgba(229,9,20,0.1);
  padding: 2px 8px; border-radius: 4px;
}
/* Expanded case study */
.ch2 .case-study {
  background: #1a1a1a; border-radius: 12px; padding: 30px;
  max-width: 700px; margin: 0 auto;
  display: none; border: 1px solid rgba(255,255,255,0.08);
}
.ch2 .case-study.active { display: block; }
.ch2 .case-study .back-btn {
  font-family: 'Inter', sans-serif; font-size: 13px;
  color: #e50914; cursor: pointer; margin-bottom: 20px;
  display: inline-block;
}
.ch2 .case-study h2 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 28px; font-weight: 700; margin-bottom: 24px;
}
.ch2 .case-study h4 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 16px; font-weight: 600; color: #e50914;
  margin-top: 24px; margin-bottom: 8px;
  text-transform: uppercase; letter-spacing: 1px;
}
.ch2 .case-study p {
  font-size: 14px; line-height: 1.7; color: rgba(255,255,255,0.8);
}

/* ============================================
   CHANNEL 3: THE GRAND LINE REPORT
   ============================================ */
.ch3 {
  width: 100%; min-height: 100%; position: relative;
  background:
    url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E"),
    linear-gradient(180deg, #0d0d0d, #1a1008, #0d0d0d);
  padding: 40px 24px 60px;
}
.ch3 .show-header {
  text-align: center; margin-bottom: 40px;
}
.ch3 .show-header h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(24px, 5vw, 48px);
  font-weight: 800; color: #ff3333;
  text-shadow: 0 0 30px rgba(255,50,50,0.3);
  letter-spacing: 2px;
}
.ch3 .show-header p {
  font-size: 14px; color: rgba(255,255,255,0.4);
  margin-top: 8px; font-style: italic;
}
.ch3 .cork-board {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 24px; max-width: 1000px; margin: 0 auto;
  position: relative;
}
.ch3 .theory-card {
  background: #fff8dc;
  color: #222;
  padding: 24px;
  border-radius: 2px;
  box-shadow: 2px 4px 12px rgba(0,0,0,0.4);
  transform: rotate(var(--rot, 0deg));
  cursor: pointer;
  transition: transform 0.3s, box-shadow 0.3s;
  position: relative;
}
.ch3 .theory-card:hover {
  transform: rotate(0deg) scale(1.05);
  box-shadow: 4px 8px 24px rgba(0,0,0,0.6);
  z-index: 10;
}
.ch3 .theory-card .pin {
  position: absolute; top: -8px; left: 50%;
  transform: translateX(-50%);
  width: 20px; height: 20px;
  background: radial-gradient(circle at 40% 40%, #ff4444, #aa0000);
  border-radius: 50%;
  box-shadow: 0 2px 6px rgba(0,0,0,0.5);
}
.ch3 .theory-card .classified {
  position: absolute; top: 12px; right: 12px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 10px; font-weight: 700;
  color: #cc0000; border: 2px solid #cc0000;
  padding: 2px 6px; transform: rotate(12deg);
  letter-spacing: 2px;
}
.ch3 .theory-card h3 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 18px; font-weight: 700; color: #1a1a1a;
  margin-top: 16px; margin-bottom: 8px;
}
.ch3 .theory-card .teaser {
  font-size: 14px; line-height: 1.6; color: #444;
  font-style: italic;
}
.ch3 .theory-card .redacted {
  background: #222; color: #222; padding: 0 4px;
  border-radius: 2px; user-select: none;
  transition: color 0.3s;
}
.ch3 .theory-card:hover .redacted { color: #cc0000; }
/* Red strings */
.ch3 .red-string {
  position: absolute; z-index: 0;
  border-top: 2px solid rgba(255,0,0,0.25);
  transform-origin: left center;
  pointer-events: none;
}
/* Theory full reveal */
.ch3 .theory-reveal-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.85);
  display: none; align-items: center; justify-content: center;
  cursor: pointer;
}
.ch3 .theory-reveal-overlay.active { display: flex; }
.ch3 .theory-reveal-content {
  max-width: 600px; padding: 40px;
  font-size: 16px; line-height: 1.8;
  color: #ffdddd;
  font-family: 'JetBrains Mono', monospace;
}
.ch3 .theory-reveal-content h2 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 28px; color: #ff3333;
  margin-bottom: 20px;
}
.ch3 .typing-cursor {
  display: inline-block; width: 2px; height: 1em;
  background: #ff3333; margin-left: 2px;
  animation: blink 0.7s step-end infinite;
}
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

/* ============================================
   CHANNEL 4: GRILLED CHEESE CHAMPIONSHIP
   ============================================ */
.ch4 {
  width: 100%; min-height: 100%;
  background: linear-gradient(135deg, #ff8800, #ff5500, #ff3300);
  padding: 30px 20px 60px;
  overflow-x: hidden;
}
.ch4 .title-bar {
  text-align: center; margin-bottom: 30px;
}
.ch4 .title-bar h1 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(22px, 5vw, 44px);
  font-weight: 800; color: #fff;
  text-shadow: 2px 2px 0 rgba(0,0,0,0.2);
  letter-spacing: 2px;
}
.ch4 .title-bar p {
  font-size: 14px; color: rgba(255,255,255,0.8);
  margin-top: 4px;
}
/* Bracket */
.ch4 .bracket {
  display: flex; align-items: center; justify-content: center;
  gap: 12px; overflow-x: auto; padding: 10px 0 20px;
}
.ch4 .bracket-round {
  display: flex; flex-direction: column; gap: 12px;
  min-width: 140px;
}
.ch4 .bracket-round .round-label {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px; font-weight: 600;
  color: rgba(255,255,255,0.6); text-align: center;
  text-transform: uppercase; letter-spacing: 2px;
  margin-bottom: 4px;
}
.ch4 .match-box {
  background: rgba(255,255,255,0.15);
  border-radius: 8px; overflow: hidden;
  backdrop-filter: blur(4px);
}
.ch4 .match-entry {
  padding: 8px 12px; font-size: 13px; font-weight: 500;
  color: #fff; display: flex; justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.1);
  font-family: 'Inter', sans-serif;
}
.ch4 .match-entry:last-child { border-bottom: none; }
.ch4 .match-entry.winner { background: rgba(255,255,255,0.15); font-weight: 700; }
.ch4 .match-entry .score {
  font-family: 'JetBrains Mono', monospace; font-size: 12px;
  color: rgba(255,255,255,0.7);
}
/* Champion */
.ch4 .champion-banner {
  text-align: center; margin: 30px auto 20px;
  max-width: 400px;
  background: linear-gradient(135deg, rgba(255,215,0,0.3), rgba(255,215,0,0.1));
  border: 2px solid rgba(255,215,0,0.5);
  border-radius: 16px; padding: 24px;
}
.ch4 .champion-banner .trophy { font-size: 48px; margin-bottom: 8px; }
.ch4 .champion-banner h2 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 24px; font-weight: 800; color: #fff;
}
.ch4 .champion-banner p {
  font-size: 13px; color: rgba(255,255,255,0.8); margin-top: 4px;
}
/* Scores */
.ch4 .scores {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px; max-width: 700px; margin: 20px auto;
}
.ch4 .score-card {
  background: rgba(255,255,255,0.12);
  border-radius: 12px; padding: 16px;
  backdrop-filter: blur(4px);
}
.ch4 .score-card h3 {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 16px; font-weight: 700; margin-bottom: 12px;
}
.ch4 .score-row {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 6px; font-size: 13px;
}
.ch4 .score-row .label { color: rgba(255,255,255,0.8); }
.ch4 .score-row .val {
  font-family: 'JetBrains Mono', monospace; font-weight: 700;
}
.ch4 .score-bar {
  height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px;
  margin-top: 2px; margin-bottom: 8px;
}
.ch4 .score-bar .fill {
  height: 100%; background: #ffdd44; border-radius: 2px;
  transition: width 0.5s ease;
}
/* Replay button */
.ch4 .replay-btn {
  display: block; margin: 24px auto;
  background: rgba(0,0,0,0.3); border: 2px solid rgba(255,255,255,0.4);
  color: #fff; padding: 12px 28px; border-radius: 40px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 15px; font-weight: 600; cursor: pointer;
  letter-spacing: 1px;
  transition: background 0.2s, transform 0.2s;
}
.ch4 .replay-btn:hover { background: rgba(0,0,0,0.5); transform: scale(1.05); }
/* Replay overlay */
.ch4 .replay-overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.9);
  display: none; align-items: center; justify-content: center;
  flex-direction: column; cursor: pointer;
}
.ch4 .replay-overlay.active { display: flex; }
.ch4 .replay-overlay .zoom-text {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(28px, 6vw, 64px);
  font-weight: 800; color: #ffdd44;
  text-align: center;
  animation: zoomIn 2s ease forwards;
  text-shadow: 0 0 40px rgba(255,221,68,0.5);
}
@keyframes zoomIn {
  0% { transform: scale(0.5); opacity: 0; }
  60% { transform: scale(1.1); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}
.ch4 .replay-overlay .trophy-big {
  font-size: 80px;
  animation: zoomIn 2.5s ease forwards;
}

/* ============================================
   CHANNEL 5: GALLERY HOUR
   ============================================ */
.ch5 {
  width: 100%; min-height: 100%;
  background: linear-gradient(180deg, #f5efe6, #e8ddd0, #f5efe6);
  color: #2a2218;
  padding: 40px 24px 60px;
}
.ch5 .show-title {
  font-family: 'Space Grotesk', sans-serif;
  font-size: clamp(22px, 4vw, 36px);
  font-weight: 600; color: #5a4a36;
  text-align: center; margin-bottom: 6px;
}
.ch5 .show-subtitle {
  text-align: center; font-size: 14px;
  color: #8a7a66; margin-bottom: 36px;
  font-style: italic;
}
.ch5 .easel {
  max-width: 500px; margin: 0 auto 24px;
  background: #fff; border-radius: 4px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  padding: 20px;

const staticCanvas = document.getElementById('static-canvas');
const staticCtx = staticCanvas.getContext('2d');
let staticAnimFrame = null;

function resizeStatic() {
  staticCanvas.width = window.innerWidth;
  staticCanvas.height = window.innerHeight;
}
resizeStatic();
window.addEventListener('resize', resizeStatic);

function drawStatic() {
  const w = staticCanvas.width, h = staticCanvas.height;
  const imageData = staticCtx.createImageData(w, h);
  const data = imageData.data;
  for (let i = 0; i < data.length; i += 4) {
    const v = Math.random() * 255;
    data[i] = v;
    data[i+1] = v;
    data[i+2] = v;
    data[i+3] = 255;
  }
  staticCtx.putImageData(imageData, 0, 0);
  staticAnimFrame = requestAnimationFrame(drawStatic);
}

function showStatic(duration = 500) {
  return new Promise(resolve => {
    staticCanvas.classList.add('active');
    drawStatic();
    setTimeout(() => {
      staticCanvas.classList.remove('active');
      cancelAnimationFrame(staticAnimFrame);
      resolve();
    }, duration);
  });

function getLang() { return isSAP ? 'jp' : 'en'; }

function renderChannel(ch) {
  const el = document.getElementById('channel-content');
  el.scrollTop = 0;

  if (ch === 0) { renderCh0(el); return; }
  if (ch === 1) { renderCh1(el); return; }
  if (ch === 2) { renderCh2(el); return; }
  if (ch === 3) { renderCh3(el); return; }
  if (ch === 4) { renderCh4(el); return; }
  if (ch === 5) { renderCh5(el); return; }
  if (ch === 6) { renderCh6(el); return; }
}

// -- Channel 0: Static Easter Egg --
function renderCh0(el) {
  el.innerHTML = `<div class="ch0"><canvas id="ch0-static"></canvas><div class="subliminal" id="subliminal-msg"></div></div>`;
  const canvas = document.getElementById('ch0-static');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const messages = [
    'eat more grilled cheese', 'hire rika', 'one piece is real',
    'the void century happened', 'debug your life', 'cheddar > brie',
    '\u8389\u9999\u3092\u63A1\u7528\u3057\u3066', 'luffy will be pirate king',
    'this is not a portfolio', 'press 1 for vibes'
  ];
  let msgIdx = 0;

  function drawNoise() {
    const w = canvas.width, h = canvas.height;
    const imgData = ctx.createImageData(w, h);
    const d = imgData.data;
    for (let i = 0; i < d.length; i += 4) {
      const v = Math.random() * 255;
      d[i] = v; d[i+1] = v; d[i+2] = v; d[i+3] = 255;
    }
    ctx.putImageData(imgData, 0, 0);
    if (currentChannel === 0) requestAnimationFrame(drawNoise);
  }
  drawNoise();

  const msgEl = document.getElementById('subliminal-msg');
  let subliminalInterval = setInterval(() => {
    if (currentChannel !== 0) { clearInterval(subliminalInterval); return; }
    msgEl.textContent = messages[msgIdx % messages.length];
    msgEl.style.opacity = '0.8';
    setTimeout(() => { msgEl.style.opacity = '0'; }, 150);
    msgIdx++;
  }, 2000);
}

          <h3>${p.title}</h3>
          <p>${p.desc}</p>

window.showTheory = function(idx) {
  const d = content[getLang()].ch3.theories[idx];
  const overlay = document.getElementById('theory-overlay');
  const contentEl = document.getElementById('theory-content');

  contentEl.innerHTML = `<h2>${d.title}</h2><div id="theory-typing"></div>`;
  overlay.classList.add('active');

  // Typing animation
  const typingEl = document.getElementById('theory-typing');
  const text = d.full;
  let charIdx = 0;

  function typeChar() {
    if (charIdx < text.length && overlay.classList.contains('active')) {
      typingEl.textContent = text.substring(0, charIdx + 1);
      charIdx++;
      setTimeout(typeChar, 8);
    }
  }
  typeChar();
};

window.closeTheory = function() {
  document.getElementById('theory-overlay').classList.remove('active');
};

  d.scores.forEach((s, i) => {
    const categories = [
      { label: isSAP ? '\u30C1\u30FC\u30BA\u4F38\u3073' : 'Cheese Pull', val: s.cheese },
      { label: isSAP ? '\u30AB\u30EA\u30C3\u3068\u5EA6' : 'Crunch Factor', val: s.crunch },
      { label: isSAP ? '\u5473' : 'Flavor', val: s.flavor },
      { label: isSAP ? '\u30D0\u30A4\u30D6\u30B9' : 'Vibes', val: s.vibes }
    ];
    let rows = '';
    categories.forEach(c => {
      rows += `
        <div class="score-row">
          <span class="label">${c.label}</span>
          <span class="val">${c.val}/10</span>
        </div>
        <div class="score-bar"><div class="fill" style="width:${c.val * 10}%"></div></div>`;
    });
    scoresHTML += `
      <div class="score-card">
        <h3>${medals[i]} ${s.name}</h3>
        ${rows}
      </div>`;
  });

  const replayLabel = isSAP ? '\u30A4\u30F3\u30B9\u30BF\u30F3\u30C8\u30EA\u30D7\u30EC\u30A4' : 'INSTANT REPLAY';

  el.innerHTML = `
    <div class="ch4">
      <div class="title-bar">
        <h1>${d.title}</h1>
        <p>${d.subtitle}</p>
      </div>
      ${bracketHTML}
      <div class="champion-banner">
        <div class="trophy">\uD83C\uDFC6</div>
        <h2>${isSAP ? '\u30C1\u30E3\u30F3\u30D4\u30AA\u30F3' : 'CHAMPION'}: ${d.winner}</h2>
        <p>"${d.winnerQuote}"</p>
      </div>
      <div class="scores">${scoresHTML}</div>
      <button class="replay-btn" onclick="showReplay()">${replayLabel}</button>
      <div class="replay-overlay" id="replay-overlay" onclick="closeReplay()">
        <div class="zoom-text">${isSAP ? '\u305D\u3057\u3066\u512A\u52DD\u8005\u306F...' : 'AND THE WINNER IS...'}</div>
        <div class="trophy-big">\uD83C\uDFC6</div>
        <div class="zoom-text" style="animation-delay:1s;font-size:clamp(36px,8vw,80px)">${d.winner}</div>
      </div>
    </div>`;
}

window.showReplay = function() {
  document.getElementById('replay-overlay').classList.add('active');
};
window.closeReplay = function() {
  document.getElementById('replay-overlay').classList.remove('active');
};

// -- Channel 5: Gallery Hour --
let galleryIdx = 0;

function renderCh5(el) {
  const d = content[getLang()].ch5;
  galleryIdx = 0;

  el.innerHTML = `
    <div class="ch5">
      <div class="show-title">${d.title}</div>
      <div class="show-subtitle">${d.subtitle}</div>
      <div class="gallery-nav">
        <button onclick="galleryPrev()">\u2190</button>
        <button onclick="galleryNext()">\u2192</button>
      </div>
      <div class="gallery-dots" id="gallery-dots"></div>
      <div class="easel">
        <div class="art-display" id="art-display"></div>
        <div class="art-info" id="art-info"></div>
      </div>
      <div class="speed-paint">
        <button onclick="speedPaint()">${isSAP ? '\u30B9\u30D4\u30FC\u30C9\u30DA\u30A4\u30F3\u30C8' : 'Speed Paint'}</button>
        <div class="progress-bar" id="speed-bar"><div class="fill" id="speed-fill"></div></div>
      </div>
    </div>`;

  updateGallery();
}

function updateGallery() {
  const d = content[getLang()].ch5.pieces;
  const piece = d[galleryIdx];

  const display = document.getElementById('art-display');
  const info = document.getElementById('art-info');
  const dots = document.getElementById('gallery-dots');

  if (!display) return;

  display.style.background = piece.bg;
  display.textContent = piece.emoji;

  info.innerHTML = `
    <h3>${piece.title}</h3>
    <div class="medium">${piece.type}</div>
    <div class="date">${piece.date}</div>
    <div class="commentary">"${piece.commentary}"</div>`;

  dots.innerHTML = d.map((_, i) =>
    `<div class="dot ${i === galleryIdx ? 'active' : ''}" onclick="galleryGo(${i})"></div>`
  ).join('');
}

window.galleryPrev = function() {
  const d = content[getLang()].ch5.pieces;
  galleryIdx = (galleryIdx - 1 + d.length) % d.length;
  updateGallery();
};
window.galleryNext = function() {
  const d = content[getLang()].ch5.pieces;
  galleryIdx = (galleryIdx + 1) % d.length;
  updateGallery();
};
window.galleryGo = function(i) {
  galleryIdx = i;
  updateGallery();
};
window.speedPaint = function() {
  const bar = document.getElementById('speed-bar');
  const fill = document.getElementById('speed-fill');
  bar.classList.add('active');
  fill.style.width = '0%';
  requestAnimationFrame(() => {
    fill.style.width = '100%';
  });
  setTimeout(() => {
    bar.classList.remove('active');
    fill.style.width = '0%';
  }, 3500);
};

// -- Channel 6: Tadaima --
function renderCh6(el) {
  const d = content[getLang()].ch6;

  const placeholderBgs = [
    'linear-gradient(135deg,#ff9a56,#ff6a00)', 'linear-gradient(135deg,#56c2ff,#0080ff)', 'linear-gradient(135deg,#ff567a,#ff0040)',
    'linear-gradient(135deg,#56ff9a,#00cc44)', 'linear-gradient(135deg,#c256ff,#8800ff)', 'linear-gradient(135deg,#ffdc56,#ffaa00)',
    'linear-gradient(135deg,#ff56dc,#cc00aa)', 'linear-gradient(135deg,#56ffdc,#00ccaa)',
    'linear-gradient(135deg,#5678ff,#0044cc)', 'linear-gradient(135deg,#dc56ff,#aa00cc)',
    'linear-gradient(135deg,#ff5656,#cc0000)', 'linear-gradient(135deg,#56ff56,#00cc00)'
  ];
  let bgIdx = 0;

  let segHTML = '';
  d.segments.forEach(seg => {
    let itemsHTML = '';
    seg.items.forEach(item => {
      const bg = placeholderBgs[bgIdx++ % placeholderBgs.length];
      itemsHTML += `
        <div class="item">
          <div class="photo-placeholder" style="background:${bg}">${seg.icon}</div>
          <div class="text">
            <h3>${item.name}</h3>
            <p>${item.desc}</p>
            <div class="rating">${item.rating}</div>
            ${item.jp ? `<div class="jp-text">${item.jp}</div>` : ''}
          </div>
        </div>`;
    });
    segHTML += `
      <div class="segment">
        <h2>${seg.icon} ${seg.title}</h2>
        ${itemsHTML}
      </div>`;
  });

  el.innerHTML = `
    <div class="ch6">
      <div class="show-title">${d.title}</div>
      <div class="show-subtitle">${d.subtitle}</div>
      <div class="segments">${segHTML}</div>
    </div>`;
}

// ============================================
// TV GUIDE
// ============================================
function renderTVGuide() {
  const list = document.getElementById('guide-list');
  const meta = channelMeta[getLang()];
  list.innerHTML = meta.map(ch => `
    <div class="guide-row" onclick="guideSelect(${ch.num})">
      <div class="ch-num">${ch.num}</div>
      <div class="ch-info">
        <h3>${ch.name}</h3>
        <p>${ch.desc}</p>
      </div>
    </div>`).join('');
}

window.guideSelect = function(ch) {
  closeGuide();
  goChannel(ch);
};

function openGuide() {
  renderTVGuide();
  document.getElementById('tv-guide').classList.add('active');
  isGuideOpen = true;
}

function closeGuide() {
  document.getElementById('tv-guide').classList.remove('active');
  isGuideOpen = false;
}

// ============================================
// CHANNEL SWITCHING
// ============================================
function showChannelIndicator(ch) {
  const el = document.getElementById('channel-indicator');
  el.textContent = ch.toString().padStart(2, '0');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function updateRemote(ch) {
  document.getElementById('remote-ch').textContent = ch.toString().padStart(2, '0');
  // Update mobile dots
  document.querySelectorAll('.mobile-ch-dot').forEach((dot, i) => {
    dot.classList.toggle('active', i + 1 === ch);
  });
}

async function goChannel(ch) {
  if (ch < 0 || ch > 6 || isTransitioning || isPoweredOff) return;
  if (ch === currentChannel && ch !== 0) return;

  isTransitioning = true;
  showChannelIndicator(ch);
  updateRemote(ch);

  await showStatic(400);
  currentChannel = ch;
  renderChannel(ch);
  isTransitioning = false;
}

function channelUp() {
  let next = currentChannel + 1;
  if (next > 6) next = 0;
  goChannel(next);
}

function channelDown() {
  let prev = currentChannel - 1;
  if (prev < 0) prev = 6;
  goChannel(prev);
}

// ============================================
// POWER
// ============================================
function powerOff() {
  isPoweredOff = true;
  document.getElementById('power-off-screen').classList.add('active');
}

function powerOn() {
  isPoweredOff = false;
  document.getElementById('power-off-screen').classList.remove('active');
  goChannel(currentChannel);
}
window.powerOn = powerOn;

// ============================================
// MUTE & SAP
// ============================================
function toggleMute() {
  isMuted = !isMuted;
  document.getElementById('mute-overlay').classList.toggle('active', isMuted);
}

function toggleSAP() {
  isSAP = !isSAP;
  document.getElementById('sap-badge').classList.toggle('active', isSAP);
  renderChannel(currentChannel);
}

// ============================================
// VOLUME (for shake easter egg)
// ============================================
function setVolumeMax(isMax) {
  document.getElementById('channel-content').classList.toggle('volume-shake', isMax);
}

// ============================================
// KEYBOARD SHORTCUTS
// ============================================
document.addEventListener('keydown', e => {
  if (isPoweredOff) {
    if (e.key === 'q' || e.key === 'Q') powerOn();
    return;
  }
  if (isGuideOpen) {
    if (e.key === '0' || e.key === 'Escape') closeGuide();
    return;
  }

  switch(e.key) {
    case '0': openGuide(); break;
    case '1': goChannel(1); break;
    case '2': goChannel(2); break;
    case '3': goChannel(3); break;
    case '4': goChannel(4); break;
    case '5': goChannel(5); break;
    case '6': goChannel(6); break;
    case 'm': case 'M': toggleMute(); break;
    case 'q': case 'Q': powerOff(); break;
    case 'ArrowUp': e.preventDefault(); channelUp(); break;
    case 'ArrowDown': e.preventDefault(); channelDown(); break;
    case '+': case '=':
      volume = Math.min(10, volume + 1);
      setVolumeMax(volume >= 10);
      break;
    case '-': case '_':
      volume = Math.max(0, volume - 1);
      setVolumeMax(volume >= 10);
      break;
  }
});

// ============================================
// DRAGGABLE REMOTE (desktop only)
// ============================================
(function() {
  const remote = document.getElementById('remote');
  let isDragging = false;
  let startX, startY, origX, origY;

  remote.addEventListener('mousedown', e => {
    if (window.innerWidth <= 768) return;
    if (e.target.tagName === 'BUTTON') return;
    isDragging = true;
    startX = e.clientX;
    startY = e.clientY;
    const rect = remote.getBoundingClientRect();
    origX = rect.left;
    origY = rect.top;
    remote.style.transition = 'none';
  });

  document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    remote.style.position = 'fixed';
    remote.style.left = (origX + dx) + 'px';
    remote.style.top = (origY + dy) + 'px';
    remote.style.right = 'auto';
    remote.style.bottom = 'auto';
  });

  document.addEventListener('mouseup', () => {
    isDragging = false;
    remote.style.transition = '';
  });
})();

// ============================================
// MOBILE SWIPE
// ============================================
(function() {
  let touchStartX = 0;
  let touchEndX = 0;

  document.addEventListener('touchstart', e => {
    touchStartX = e.changedTouches[0].screenX;
  }, { passive: true });

  document.addEventListener('touchend', e => {
    touchEndX = e.changedTouches[0].screenX;
    const diff = touchStartX - touchEndX;
    if (Math.abs(diff) > 60) {
      if (diff > 0) channelUp();
      else channelDown();
    }
  }, { passive: true });
})();

// ============================================
// BOOT SEQUENCE
// ============================================
(async function boot() {
  // Show test pattern for 2 seconds
  await new Promise(r => setTimeout(r, 2000));

  // Hide test pattern, show static
  document.getElementById('test-pattern').style.display = 'none';
  await showStatic(500);

  // Render channel 1
  currentChannel = 1;
  updateRemote(1);
  showChannelIndicator(1);
  renderChannel(1);
})();
</script>
