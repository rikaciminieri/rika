<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RikaOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f1117;
  --surface: #181a20;
  --surface-2: #1e2028;
  --border: #2a2d3a;
  --text: #e8eaf0;
  --text-muted: #8b8fa3;
  --accent: #5b9cf6;
  --accent-glow: rgba(91, 156, 246, 0.2);
  --pink: #e879a8;
  --green: #5bc784;
  --amber: #e8b84a;
  --red: #e85454;
  --blue: #5b9cf6;
  --teal: #4ecdc4;
  --taskbar-h: 48px;
  --radius: 10px;
  --win-header: 38px;
  --font: 'Inter', 'Noto Sans JP', sans-serif;
  --mono: 'JetBrains Mono', monospace;
  --display: 'Space Grotesk', 'Noto Sans JP', sans-serif;
}

html, body { height: 100%; overflow: hidden; font-family: var(--font); background: var(--bg); color: var(--text); }

/* =================== BOOT SEQUENCE =================== */
#boot-screen {
  position: fixed; inset: 0; z-index: 99999;
  background: #08090c;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-family: var(--mono);
  transition: opacity 0.6s;
}
#boot-screen.done { opacity: 0; pointer-events: none; }

.boot-logo {
  font-family: var(--display);
  font-size: 48px; font-weight: 800;
  background: linear-gradient(135deg, var(--accent), var(--teal));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 32px;
  letter-spacing: -0.03em;
}

.boot-lines { font-size: 12px; color: #555; text-align: left; width: 400px; max-width: 90vw; }
.boot-lines div { opacity: 0; animation: bootFade 0.3s forwards; }
.boot-lines .ok { color: var(--green); }
.boot-lines .warn { color: var(--amber); }
@keyframes bootFade { to { opacity: 1; } }

.boot-bar { width: 400px; max-width: 90vw; height: 3px; background: #222; border-radius: 2px; margin-top: 24px; overflow: hidden; }
.boot-bar-fill { height: 100%; width: 0; background: linear-gradient(90deg, var(--accent), var(--teal)); border-radius: 2px; animation: bootFill 2s ease-in-out forwards; }
@keyframes bootFill { to { width: 100%; } }

/* =================== DESKTOP =================== */
#desktop {
  position: fixed; inset: 0;
  opacity: 0;
  transition: opacity 0.8s 0.3s;
  display: flex;
  flex-direction: column;
}
#desktop.visible { opacity: 1; }

/* Animated mesh gradient backdrop */
.desktop-bg {
  position: fixed; inset: 0;
  z-index: -1;
  background: var(--bg);
  overflow: hidden;
}
.desktop-bg::before {
  content: '';
  position: absolute;
  width: 150%; height: 150%;
  top: -25%; left: -25%;
  background:
    radial-gradient(ellipse 600px 400px at 25% 35%, rgba(91,156,246,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 500px 500px at 75% 25%, rgba(78,205,196,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 400px 600px at 60% 75%, rgba(232,121,168,0.05) 0%, transparent 70%),
    radial-gradient(ellipse 500px 300px at 15% 80%, rgba(91,199,132,0.04) 0%, transparent 70%);
  animation: meshDrift 20s ease-in-out infinite alternate;
}
@keyframes meshDrift {
  0% { transform: translate(0, 0) rotate(0deg); }
  33% { transform: translate(30px, -20px) rotate(1deg); }
  66% { transform: translate(-20px, 15px) rotate(-0.5deg); }
  100% { transform: translate(10px, -10px) rotate(0.5deg); }
}

/* Subtle grid lines */
.desktop-bg::after {
  content: '';
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
  background-size: 60px 60px;
}

/* Kanji watermark */
.watermark {
  position: fixed;
  right: 60px; bottom: 80px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 200px; font-weight: 700;
  color: rgba(91,156,246,0.03);
  pointer-events: none;
  user-select: none;
  line-height: 1;
}

/* =================== DESKTOP ICONS =================== */
.desktop-icons {
  flex: 1;
  padding: 24px;
  display: flex;
  flex-direction: column;
  flex-wrap: wrap;
  gap: 8px;
  align-content: start;
  max-width: 200px;
}

.desktop-icon {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 6px;
  width: 84px; height: 84px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
}
.desktop-icon:hover { background: rgba(91,156,246,0.08); }
.desktop-icon:active { transform: scale(0.95); }

.desktop-icon .icon-img {
  width: 48px; height: 48px;
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  font-weight: 700;
  font-family: var(--display);
  color: white;
  position: relative;
  overflow: hidden;
}

/* Unique icon styles per app */
.icon-welcome { background: linear-gradient(135deg, #5b9cf6, #4ecdc4); }
.icon-projects { background: linear-gradient(135deg, #e879a8, #f6a05b); }
.icon-terminal { background: #1a1a1a; border: 1px solid #333; font-family: var(--mono) !important; font-size: 14px !important; color: var(--green) !important; }
.icon-gallery { background: linear-gradient(135deg, #a78bfa, #e879a8); }
.icon-gc { background: linear-gradient(135deg, #f6c95b, #e88a4a); }
.icon-trash { background: var(--surface-2); border: 1px solid var(--border); color: var(--text-muted) !important; font-size: 20px !important; }
.icon-currently { background: linear-gradient(135deg, #4ecdc4, #5bc784); }
.icon-japan { background: linear-gradient(135deg, #ff8fa3, #ff6b6b); }

/* Icon inner decoration */
.icon-terminal::before {
  content: '>_';
  font-family: var(--mono);
  font-size: 16px;
  color: var(--green);
}
.icon-projects::after {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(45deg, transparent, transparent 4px, rgba(255,255,255,0.05) 4px, rgba(255,255,255,0.05) 8px);
}
.icon-gallery::after {
  content: '';
  position: absolute;
  width: 24px; height: 24px;
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 4px;
  transform: rotate(5deg);
}

.desktop-icon .icon-label {
  font-size: 10px;
  color: var(--text-muted);
  text-align: center;
  line-height: 1.2;
  max-width: 80px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* =================== WINDOWS =================== */
.window {
  position: absolute;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(91,156,246,0.05);
  display: flex; flex-direction: column;
  min-width: 320px; min-height: 200px;
  overflow: hidden;
  animation: winOpen 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes winOpen { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

.window.minimized { animation: winMin 0.2s forwards; pointer-events: none; }
@keyframes winMin { to { transform: scale(0.5) translateY(100vh); opacity: 0; } }

.window.focused { box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(91,156,246,0.15), 0 0 30px var(--accent-glow); }

.win-header {
  height: var(--win-header);
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 12px;
  cursor: grab;
  user-select: none;
  flex-shrink: 0;
}
.win-header:active { cursor: grabbing; }

.win-dots { display: flex; gap: 7px; }
.win-dot { width: 12px; height: 12px; border-radius: 50%; border: none; cursor: pointer; transition: transform 0.15s; }
.win-dot:hover { transform: scale(1.2); }
.win-dot.close { background: var(--red); }
.win-dot.minimize { background: var(--amber); }
.win-dot.maximize { background: var(--green); }

.win-title { flex: 1; text-align: center; font-size: 12px; font-weight: 500; color: var(--text-muted); pointer-events: none; }

.win-body { flex: 1; overflow: auto; padding: 20px; }
.win-body::-webkit-scrollbar { width: 6px; }
.win-body::-webkit-scrollbar-track { background: transparent; }
.win-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.win-resize { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: nwse-resize; }

/* =================== TASKBAR =================== */
.taskbar {
  height: var(--taskbar-h);
  background: rgba(15, 17, 23, 0.85);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 12px;
  z-index: 9000;
  gap: 4px;
}

.tb-start {
  width: 36px; height: 36px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, var(--accent), var(--teal));
  color: white;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s;
  font-weight: 700;
  font-family: var(--display);
}
.tb-start:hover { transform: scale(1.08); }

.tb-divider { width: 1px; height: 28px; background: var(--border); margin: 0 8px; }

.tb-apps { display: flex; gap: 3px; flex: 1; overflow-x: auto; }

.tb-app {
  padding: 4px 14px; border-radius: 8px; border: none;
  background: transparent; color: var(--text-muted);
  font-family: var(--font); font-size: 12px;
  cursor: pointer; white-space: nowrap; transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
}
.tb-app:hover { background: rgba(91,156,246,0.08); color: var(--text); }
.tb-app.active { background: rgba(91,156,246,0.12); color: var(--text); }
.tb-app .tb-app-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }

.tb-tray { display: flex; align-items: center; gap: 12px; margin-left: auto; font-size: 12px; color: var(--text-muted); }
.tb-tray-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 12px; font-family: var(--mono); transition: color 0.15s; padding: 4px 8px; border-radius: 6px; }
.tb-tray-btn:hover { color: var(--text); background: rgba(255,255,255,0.05); }
#clock { font-family: var(--mono); font-size: 12px; color: var(--text-muted); }

/* =================== COMMAND PALETTE =================== */
.cmd-overlay { position: fixed; inset: 0; background: rgba(8,9,12,0.6); backdrop-filter: blur(8px); z-index: 50000; display: none; align-items: flex-start; justify-content: center; padding-top: 20vh; }
.cmd-overlay.open { display: flex; }
.cmd-box { width: 560px; max-width: 90vw; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; box-shadow: 0 30px 80px rgba(0,0,0,0.5); overflow: hidden; animation: cmdOpen 0.15s ease-out; }
@keyframes cmdOpen { from { transform: scale(0.96) translateY(-8px); opacity: 0; } }
.cmd-input { width: 100%; padding: 16px 20px; background: transparent; border: none; outline: none; color: var(--text); font-family: var(--font); font-size: 16px; border-bottom: 1px solid var(--border); }
.cmd-input::placeholder { color: var(--text-muted); }
.cmd-results { max-height: 320px; overflow-y: auto; }
.cmd-item { padding: 10px 20px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: background 0.1s; font-size: 14px; }
.cmd-item:hover, .cmd-item.selected { background: rgba(91,156,246,0.1); }
.cmd-item .cmd-icon { font-size: 18px; width: 28px; text-align: center; }
.cmd-item .cmd-label { flex: 1; }
.cmd-item .cmd-hint { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }

/* =================== CONTEXT MENU =================== */
.ctx-menu { position: fixed; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 6px; min-width: 200px; box-shadow: 0 12px 40px rgba(0,0,0,0.4); z-index: 60000; display: none; animation: ctxOpen 0.12s ease-out; }
@keyframes ctxOpen { from { transform: scale(0.95); opacity: 0; } }
.ctx-menu.open { display: block; }
.ctx-item { padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 10px; transition: background 0.1s; color: var(--text); }
.ctx-item:hover { background: rgba(91,156,246,0.12); }
.ctx-item .ctx-icon { width: 20px; text-align: center; }
.ctx-sep { height: 1px; background: var(--border); margin: 4px 8px; }

/* =================== APP: WELCOME NOTEPAD =================== */
.notepad-content { font-family: var(--font); font-size: 14px; line-height: 1.8; color: var(--text); }
.notepad-content h2 { font-family: var(--display); font-size: 22px; font-weight: 700; margin-bottom: 12px; background: linear-gradient(135deg, var(--accent), var(--teal)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.notepad-content p { margin-bottom: 12px; }
.notepad-content .aside { color: var(--text-muted); font-style: italic; font-size: 13px; }

/* =================== APP: TERMINAL =================== */
.terminal { font-family: var(--mono); font-size: 13px; line-height: 1.7; color: var(--green); background: #0a0a0f; padding: 20px; height: 100%; }
.terminal .prompt { color: var(--accent); }
.terminal .cmd-text { color: var(--text); }
.terminal .output { color: var(--text-muted); white-space: pre-wrap; }
.terminal .error { color: var(--red); }
.terminal .highlight { color: var(--amber); }
.term-input-line { display: flex; align-items: center; gap: 0; }
.term-input { background: transparent; border: none; outline: none; color: var(--text); font-family: var(--mono); font-size: 13px; flex: 1; caret-color: var(--green); }

/* =================== APP: PROJECTS =================== */
.projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
.project-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; cursor: pointer; transition: all 0.2s; }
.project-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.project-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.project-card p { font-size: 12px; color: var(--text-muted); line-height: 1.5; margin-bottom: 10px; }
.project-card .tags { display: flex; gap: 6px; flex-wrap: wrap; }
.project-card .tag { font-family: var(--mono); font-size: 10px; padding: 3px 8px; border-radius: 6px; background: rgba(91,156,246,0.1); color: var(--accent); }

/* =================== APP: GALLERY =================== */
.gallery-scroll { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 16px; scroll-snap-type: x mandatory; }
.gallery-scroll::-webkit-scrollbar { height: 4px; }
.gallery-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.gallery-item { flex-shrink: 0; width: 260px; scroll-snap-align: start; }
.gallery-thumb { width: 100%; height: 200px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 48px; margin-bottom: 10px; border: 1px solid var(--border); }
.gallery-item h4 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.gallery-item p { font-size: 12px; color: var(--text-muted); }

/* =================== APP: GRILLED CHEESE =================== */
.gc-podium { display: flex; align-items: flex-end; justify-content: center; gap: 16px; margin-bottom: 32px; }
.gc-podium-item { text-align: center; padding: 16px; border-radius: 12px; background: var(--surface-2); border: 1px solid var(--border); }
.gc-podium-item.gold { border-color: #e8b84a; order: 2; }
.gc-podium-item.silver { border-color: #94a3b8; order: 1; }
.gc-podium-item.bronze { border-color: #d97706; order: 3; }
.gc-medal { font-size: 32px; }
.gc-name { font-size: 14px; font-weight: 600; margin-top: 8px; }
.gc-score { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }
.gc-bracket { display: flex; gap: 40px; align-items: center; overflow-x: auto; padding: 16px 0; }
.gc-round { display: flex; flex-direction: column; gap: 20px; flex-shrink: 0; }
.gc-match { background: var(--surface-2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.gc-matchup { padding: 8px 14px; font-size: 12px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
.gc-matchup:last-child { border-bottom: none; }
.gc-matchup.winner { color: var(--accent); font-weight: 600; }

/* =================== APP: FINDER (TRASH) =================== */
.finder { height: 100%; display: flex; flex-direction: column; }
.finder-toolbar { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--surface-2); font-size: 12px; color: var(--text-muted); }
.finder-path { font-family: var(--mono); font-size: 11px; color: var(--text-muted); flex: 1; }
.finder-list { flex: 1; overflow-y: auto; }
.finder-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  cursor: pointer;
  transition: background 0.1s;
  font-size: 13px;
}
.finder-item:hover { background: rgba(91,156,246,0.06); }
.finder-item.disabled { opacity: 0.35; cursor: not-allowed; }
.finder-item.disabled:hover { background: transparent; }
.finder-item .fi-icon { font-size: 20px; width: 28px; text-align: center; flex-shrink: 0; }
.finder-item .fi-name { flex: 1; }
.finder-item .fi-meta { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }
.finder-item .fi-size { font-size: 11px; color: var(--text-muted); font-family: var(--mono); min-width: 60px; text-align: right; }

.finder-preview {
  padding: 24px;
  animation: fadeIn 0.2s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.finder-preview h3 { font-size: 16px; margin-bottom: 12px; font-family: var(--display); }
.finder-preview p { font-size: 13px; color: var(--text-muted); line-height: 1.7; margin-bottom: 8px; }
.finder-preview-back { font-size: 12px; color: var(--accent); cursor: pointer; margin-bottom: 16px; display: inline-block; }
.finder-preview-back:hover { text-decoration: underline; }

/* =================== APP: CURRENTLY INTO =================== */
.currently-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.currently-card { background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
.currently-card h4 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 8px; font-family: var(--mono); }
.currently-card .item { font-size: 13px; padding: 4px 0; display: flex; align-items: center; gap: 8px; }
.currently-card .item-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* =================== MOBILE =================== */
@media (max-width: 768px) {
  .desktop-icons { flex-direction: row; flex-wrap: wrap; max-width: 100%; justify-content: center; padding: 16px; }
  .window { position: fixed !important; inset: 0 !important; width: 100vw !important; height: calc(100vh - var(--taskbar-h)) !important; border-radius: 0 !important; min-width: unset !important; min-height: unset !important; }
  .watermark { display: none; }
  .cmd-box { border-radius: 0; }
}

/* =================== SCREENSAVER =================== */
.screensaver { position: fixed; inset: 0; background: #000; z-index: 80000; display: none; cursor: pointer; overflow: hidden; }
.screensaver.active { display: block; }

/* Aurora screensaver */
.aurora-layer {
  position: absolute; inset: 0;
  opacity: 0.6;
}
.aurora-layer:nth-child(1) {
  background: linear-gradient(180deg, transparent 30%, rgba(91,156,246,0.15) 50%, rgba(78,205,196,0.1) 65%, transparent 80%);
  animation: aurora1 8s ease-in-out infinite alternate;
}
.aurora-layer:nth-child(2) {
  background: linear-gradient(180deg, transparent 35%, rgba(232,121,168,0.1) 55%, rgba(91,156,246,0.08) 70%, transparent 85%);
  animation: aurora2 12s ease-in-out infinite alternate;
}
.aurora-layer:nth-child(3) {
  background: linear-gradient(180deg, transparent 25%, rgba(78,205,196,0.12) 45%, rgba(167,139,250,0.06) 60%, transparent 75%);
  animation: aurora3 10s ease-in-out infinite alternate;
}
@keyframes aurora1 { 0% { transform: translateX(-10%) scaleY(1); } 100% { transform: translateX(10%) scaleY(1.3); } }
@keyframes aurora2 { 0% { transform: translateX(15%) scaleY(1.2); } 100% { transform: translateX(-15%) scaleY(0.8); } }
@keyframes aurora3 { 0% { transform: translateX(-5%) scaleY(0.9); } 100% { transform: translateX(5%) scaleY(1.1); } }

.screensaver-text {
  position: absolute;
  bottom: 15%;
  width: 100%;
  text-align: center;
  font-family: var(--display);
  font-size: 14px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 0.1em;
}

/* Stars for screensaver */
.star {
  position: absolute;
  width: 2px; height: 2px;
  background: white;
  border-radius: 50%;
  animation: twinkle 3s ease-in-out infinite;
}
@keyframes twinkle { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }

/* =================== KONAMI =================== */
.cheese-rain { position: fixed; inset: 0; pointer-events: none; z-index: 90000; }
.cheese-drop { position: absolute; font-size: 32px; animation: cheeseFall linear forwards; }
@keyframes cheeseFall { from { transform: translateY(-50px) rotate(0deg); } to { transform: translateY(110vh) rotate(360deg); } }
</style>
</head>
<body>

<!-- BOOT SCREEN -->
<div id="boot-screen">

// =================== WINDOW MANAGER ===================
function openApp(appId) {
  const existing = windows.find(w => w.appId === appId && !w.minimized);
  if (existing) { focusWindow(existing.id); return; }

  const existingMin = windows.find(w => w.appId === appId && w.minimized);
  if (existingMin) {
    existingMin.minimized = false;
    const el = document.getElementById(`win-${existingMin.id}`);
    if (el) { el.classList.remove('minimized'); el.style.display = ''; }
    focusWindow(existingMin.id);
    updateTaskbar();
    return;
  }

  const app = apps.find(a => a.id === appId);
  if (!app) return;

  const id = nextWinId++;
  // Position windows to the right of the icons column
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const winW = Math.min(app.w, vw - 40);
  const winH = Math.min(app.h, vh - 100);
  // Start at x=220 to clear icons, stagger subsequent windows
  const openCount = windows.filter(w => !w.minimized).length;
  const offsetX = Math.min(220 + openCount * 30, vw - winW - 20);
  const offsetY = Math.min(30 + openCount * 25, vh - winH - 80);

  const win = { id, appId, x: offsetX, y: offsetY, w: winW, h: winH, z: nextZ++, minimized: false };
  windows.push(win);
  renderWindow(win, app);
  focusWindow(id);
  updateTaskbar();
}

function renderWindow(win, app) {

  el.id = `win-${win.id}`;
  el.style.left = win.x + 'px';
  el.style.top = win.y + 'px';
  el.style.width = win.w + 'px';
  el.style.height = win.h + 'px';
  el.style.zIndex = win.z;
  el.onmousedown = () => focusWindow(win.id);
  el.innerHTML = `
    <div class="win-header" onmousedown="startDrag(event, ${win.id})">
      <div class="win-dots">
        <button class="win-dot close" onclick="closeWindow(${win.id})"></button>

    </div>
    <div class="win-body" id="win-body-${win.id}"></div>
    <div class="win-resize" onmousedown="startResize(event, ${win.id})"></div>
  `;
  document.getElementById('windowContainer').appendChild(el);
  renderAppContent(win.id, app.id);
}

// =================== WINDOW MANAGEMENT ===================
function focusWindow(id) {
  focusedWinId = id;
  const win = windows.find(w => w.id === id);
  if (win) win.z = nextZ++;
  document.querySelectorAll('.window').forEach(el => {
    el.classList.remove('focused');
    const wid = parseInt(el.id.replace('win-', ''));
    const w = windows.find(x => x.id === wid);
    if (w) el.style.zIndex = w.z;
  });
  const el = document.getElementById(`win-${id}`);
  if (el) el.classList.add('focused');
  updateTaskbar();
}

function closeWindow(id) {
  const el = document.getElementById(`win-${id}`);
  if (el) { el.style.transition = 'transform 0.2s, opacity 0.2s'; el.style.transform = 'scale(0.9)'; el.style.opacity = '0'; setTimeout(() => el.remove(), 200); }
  windows = windows.filter(w => w.id !== id);
  if (focusedWinId === id) focusedWinId = null;
  updateTaskbar();
}

function minimizeWindow(id) {
  const win = windows.find(w => w.id === id);
  if (win) win.minimized = true;
  const el = document.getElementById(`win-${id}`);
  if (el) el.classList.add('minimized');
  if (focusedWinId === id) focusedWinId = null;
  updateTaskbar();
}

function maximizeWindow(id) {
  const el = document.getElementById(`win-${id}`);
  if (!el) return;
  const win = windows.find(w => w.id === id);
  if (!win) return;
  if (win._maximized) {
    el.style.left = win._prevX + 'px'; el.style.top = win._prevY + 'px';
    el.style.width = win._prevW + 'px'; el.style.height = win._prevH + 'px';
    win._maximized = false;
  } else {
    win._prevX = win.x; win._prevY = win.y; win._prevW = win.w; win._prevH = win.h;
    el.style.left = '0'; el.style.top = '0'; el.style.width = '100vw';
    el.style.height = `calc(100vh - var(--taskbar-h))`;
    win._maximized = true;
  }
  focusWindow(id);
}

// =================== DRAG & RESIZE ===================
let dragState = null;
function startDrag(e, winId) {
  if (e.target.classList.contains('win-dot')) return;
  e.preventDefault();
  const el = document.getElementById(`win-${winId}`);
  const rect = el.getBoundingClientRect();
  dragState = { type: 'drag', winId, startX: e.clientX, startY: e.clientY, origX: rect.left, origY: rect.top };
  focusWindow(winId);
}
function startResize(e, winId) {
  e.preventDefault(); e.stopPropagation();
  const el = document.getElementById(`win-${winId}`);
  const rect = el.getBoundingClientRect();
  dragState = { type: 'resize', winId, startX: e.clientX, startY: e.clientY, origW: rect.width, origH: rect.height };
  focusWindow(winId);
}
document.addEventListener('mousemove', e => {
  if (!dragState) return;
  const el = document.getElementById(`win-${dragState.winId}`);
  if (!el) return;
  const win = windows.find(w => w.id === dragState.winId);
  if (dragState.type === 'drag') {
    const nx = dragState.origX + (e.clientX - dragState.startX);
    const ny = dragState.origY + (e.clientY - dragState.startY);
    el.style.left = nx + 'px'; el.style.top = ny + 'px';
    if (win) { win.x = nx; win.y = ny; win._maximized = false; }
  } else if (dragState.type === 'resize') {
    const nw = Math.max(320, dragState.origW + (e.clientX - dragState.startX));
    const nh = Math.max(200, dragState.origH + (e.clientY - dragState.startY));
    el.style.width = nw + 'px'; el.style.height = nh + 'px';
    if (win) { win.w = nw; win.h = nh; }
  }
});
document.addEventListener('mouseup', () => { dragState = null; });

// =================== TASKBAR ===================
function updateTaskbar() {
  const container = document.getElementById('tbApps');
  container.innerHTML = '';
  windows.forEach(win => {
    const app = apps.find(a => a.id === win.appId);
    if (!app) return;
    const btn = document.createElement('button');
    btn.className = 'tb-app' + (win.id === focusedWinId && !win.minimized ? ' active' : '');
    btn.innerHTML = `<span class="tb-app-dot"></span>${app.label()}`;
    btn.onclick = () => {
      if (win.minimized) { win.minimized = false; const el = document.getElementById(`win-${win.id}`); if (el) { el.classList.remove('minimized'); el.style.display = ''; } }
      focusWindow(win.id);
    };
    container.appendChild(btn);
  });
}

// =================== TERMINAL ===================
function execTermCmd(winId) {
  const input = document.getElementById(`term-input-${winId}`);
  const output = document.getElementById(`term-output-${winId}`);
  if (!input || !output) return;
  const cmd = input.value.trim(); input.value = '';
  output.innerHTML += `<span class="prompt">rika@portfolio ~ % </span><span class="cmd-text">${escHtml(cmd)}</span>\n`;
  const result = processCmd(cmd);
  if (result) output.innerHTML += `<span class="output">${result}</span>\n`;
  output.innerHTML += '\n';
  const term = document.getElementById(`term-${winId}`);
  if (term) term.scrollTop = term.scrollHeight;
}

function processCmd(cmd) {
  const parts = cmd.split(/\s+/);
  const c = parts[0]?.toLowerCase();
  switch (c) {
    case '': return '';
    case 'help': return `Available commands:
  <span class="highlight">help</span>        — show this help
  <span class="highlight">whoami</span>      — who is rika?
  <span class="highlight">ls</span>          — list apps
  <span class="highlight">cat</span> [file]  — read a file (try: about.md, skills.md, currently.md)
  <span class="highlight">open</span> [app]  — open an app
  <span class="highlight">clear</span>       — clear terminal
  <span class="highlight">neofetch</span>    — system info
  <span class="highlight">fortune</span>     — random fortune
  <span class="highlight">cowsay</span> [msg] — moo`;
    case 'whoami': return `Rika Ciminieri\nHalf-Japanese full-stack engineer @ Eventbrite\nFormer microbiology student · Pilates enthusiast · Book nook builder\nFluent in: TypeScript, Python, Japanese, sarcasm`;
    case 'ls': return apps.map(a => `  ${a.label()}`).join('\n');
    case 'cat':
      const file = parts[1];
      if (!file) return '<span class="error">usage: cat [filename]</span>';
      if (file === 'about.md') return `# Rika Ciminieri\n\nHalf-Japanese full-stack engineer at Eventbrite.\nFormer microbiology student turned tech advocate.\n\nI build things that make people smile.\n\nCurrently into: Bridgerton, The Traitors, Heated Rivalry,\nlearning AI, Monopoly Deal, singing (badly), traveling.\n\nHills I'll die on:\n- Michael Jackson is the king of pop\n- The Rock's Jumanji is actually a good movie\n- Health and time with people you love matters most`;
      if (file === 'skills.md') return `# Tech Stack\n\nFrontend:  React, TypeScript, Tailwind, Next.js, Vite\nBackend:   Python, Node.js, Express, FastAPI, GraphQL\nData:      PostgreSQL, Redis, MongoDB\nInfra:     AWS, Docker, CI/CD, Vercel\n\nAlso: i18n, a11y, spring animations, WebGL basics`;
      if (file === 'currently.md') return `# Currently Into\n\nWatching: Bridgerton (again), The Traitors\nReading:  Heated Rivalry, One Piece\nPlaying:  Monopoly Deal (undefeated streak)\nLearning: AI/LLMs, how to sing\nListening: Yoasobi, Dodo, City Pop`;
      return `<span class="error">cat: ${escHtml(file)}: No such file</span>\nTry: about.md, skills.md, currently.md`;
    case 'open':
      const appName = parts[1]?.replace('.app','');
      if (appName && apps.find(a => a.id === appName)) { setTimeout(() => openApp(appName), 100); return `Opening ${appName}...`; }
      return `<span class="error">open: unknown app</span>\nAvailable: ${apps.map(a => a.id).join(', ')}`;
    case 'clear': setTimeout(() => { const w = windows.find(w => w.appId === 'terminal'); if (w) { const o = document.getElementById(`term-output-${w.id}`); if (o) o.innerHTML = ''; } }, 10); return '';
    case 'neofetch': return `\n  <span class="highlight">     ██████╗  </span>   rika@portfolio\n  <span class="highlight">    ██╔══██╗ </span>   ──────────────\n  <span class="highlight">    ██████╔╝ </span>   OS: RikaOS v2.1\n  <span class="highlight">    ██╔══██╗ </span>   Shell: rika-terminal\n  <span class="highlight">    ██║  ██║ </span>   Languages: EN, JP\n  <span class="highlight">    ╚═╝  ╚═╝ </span>   Theme: midnight-teal\n                  Uptime: since 2024\n                  Mood: good vibes`;
    case 'fortune':
      const f = ['"A well-organized codebase is worth a thousand comments." — Rika, probably','"Sometimes the real treasure is the bugs we fixed along the way."','"Have you tried turning it off and making a grilled cheese?"','"If you can\'t explain it simply, you don\'t understand it well enough." — Einstein, probably debugging','"The best code is no code at all." — Senior dev energy'];
      return f[Math.floor(Math.random()*f.length)];
    case 'cowsay':
      const msg = parts.slice(1).join(' ') || 'moo';
      return ` ┌${'─'.repeat(msg.length+2)}┐\n │ ${escHtml(msg)} │\n └${'─'.repeat(msg.length+2)}┘\n        \\   ^__^\n         \\  (oo)\\_______\n            (__)\\       )\\/\\\n                ||----w |\n                ||     ||`;
    case 'sudo': return '<span class="error">Nice try. No sudo on RikaOS.</span>';
    case 'rm': return '<span class="error">Whoa. This is a portfolio, not a demolition site.</span>';
    case 'exit': return 'Where would you even go? You\'re already home.';
    default: return `<span class="error">command not found: ${escHtml(c)}</span>\nType <span class="highlight">help</span> for available commands.`;
  }
}

  { icon: '✕', label: 'Close All Windows', hint: '', action: () => closeAllWindows() },

let cmdSelectedIdx = 0;
function openCmdPalette() { document.getElementById('cmdOverlay').classList.add('open'); const inp = document.getElementById('cmdInput'); inp.value = ''; inp.focus(); cmdSelectedIdx = 0; filterCommands(); }
function closeCmdPalette() { document.getElementById('cmdOverlay').classList.remove('open'); }
function filterCommands() {
  const q = document.getElementById('cmdInput').value.toLowerCase();
  const filtered = cmdItems.filter(item => item.label.toLowerCase().includes(q) || item.hint.toLowerCase().includes(q));
  const container = document.getElementById('cmdResults');
  cmdSelectedIdx = Math.min(cmdSelectedIdx, filtered.length - 1);
  container.innerHTML = filtered.map((item, i) => `
    <div class="cmd-item ${i === cmdSelectedIdx ? 'selected' : ''}" onclick="cmdItems.find(c=>c.label==='${item.label}').action();closeCmdPalette();" onmouseenter="cmdSelectedIdx=${i};filterCommands();">
      <span class="cmd-icon" style="font-family:var(--mono);font-size:13px;">${item.icon}</span>
      <span class="cmd-label">${item.label}</span>
      <span class="cmd-hint">${item.hint}</span>
    </div>
  `).join('');
}
function handleCmdKey(e) {
  const items = document.getElementById('cmdResults').querySelectorAll('.cmd-item');
  if (e.key === 'ArrowDown') { e.preventDefault(); cmdSelectedIdx = Math.min(cmdSelectedIdx + 1, items.length - 1); filterCommands(); }
  if (e.key === 'ArrowUp') { e.preventDefault(); cmdSelectedIdx = Math.max(cmdSelectedIdx - 1, 0); filterCommands(); }
  if (e.key === 'Enter') { items[cmdSelectedIdx]?.click(); }
  if (e.key === 'Escape') { closeCmdPalette(); }
}
